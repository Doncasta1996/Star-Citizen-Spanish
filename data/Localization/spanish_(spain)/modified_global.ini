Shubin_Industrial_HandMining_Stanton_VH_Solar_Desc_001=AVISO: Orden de Compra\nLOCALIZACION: <EM4>~mission(System) </EM4>\n\nCONDICIONES*:\nShubin Interstellar actualmente busca cumplir otra orden de compra de materiales raros. Agradecemos tu ayuda en este asunto.\n\nSolo hay unas pocas ubicaciones conocidas donde se pueden obtener estos materiales, principalmente de los sitios del ahora desaparecido Grupo Hathor en <EM4>Daymar y Aberdeen</EM4>. Nuestra sugerencia seria dirigirse a las Instalaciones de Alineacion de Plataformas (PAF) e intentar reactivar su Plataforma Laser Orbital (OLP) para acceder a los materiales debajo de la superficie del planeta.\n\nRecordatorio, dado que esta es una orden de compra y no un contrato de mineria, se espera que proporciones tu propio equipo, como un <EM4>~mission(Hint_Tool)</EM4>.\n\nUna vez que estes listo para vendernos los materiales requeridos, depositalos en el elevador de carga ubicado en <EM4>~mission(Destination|Address)</EM4>.\n\n*Al aceptar este contrato, asumes todos y cada uno de los riesgos asociados con el trabajo aqui descrito y de ninguna manera Shubin Interstellar puede ser responsable por cualquier daño acumulado durante la duracion del contrato.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Arclight "Midnight"\n- Brazos Strata\n- Torso Strata\n- Piernas Strata\n- Casco Strata Shooting Star\n- Bateria de Pistola Arclight (30 balas)\n
Shubin_Industrial_HandMining_Pyro_Nyx_VH_Interstellar_Desc_001=AVISO: Orden de Compra\nLOCALIZACION: <EM4>~mission(System) </EM4>\n\nCONDICIONES*:\nShubin Interstellar actualmente busca cumplir otra orden de compra de materiales raros. Agradecemos tu ayuda en este asunto.\n\nSolo hay unas pocas ubicaciones conocidas donde se pueden obtener estos materiales, principalmente de los sitios del ahora desaparecido Grupo Hathor en <EM4>Daymar y Aberdeen</EM4>. Nuestra sugerencia seria dirigirse a las Instalaciones de Alineacion de Plataformas (PAF) e intentar reactivar su Plataforma Laser Orbital (OLP) para acceder a los materiales debajo de la superficie del planeta.\n\nRecordatorio, dado que esta es una orden de compra y no un contrato de mineria, se espera que proporciones tu propio equipo, como un <EM4>~mission(Hint_Tool)</EM4>.\n\nUna vez que estes listo para vendernos los materiales requeridos, depositalos en el elevador de carga ubicado en <EM4>~mission(Destination|Address)</EM4>.\n\n*Al aceptar este contrato, asumes todos y cada uno de los riesgos asociados con el trabajo aqui descrito y de ninguna manera Shubin Interstellar puede ser responsable por cualquier daño acumulado durante la duracion del contrato.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Arclight "Herrero"\n- Pistola Arclight "Desert Shadow"\n- Traje de Exploracion Pembroke\n- Casco Pembroke\n- Traje de Exploracion Novikov\n- Casco Novikov\n- Bateria de Pistola Arclight (30 balas)\n
Shubin_Industrial_ShipMining_Stanton_VE_Local_Desc_001=AVISO: Orden de Compra\nLOCALIZACION: <EM4>~mission(System) </EM4>\n\nPRUEBA TECNICA PRELIMINAR:\nCompleta esta mision para obtener planos de un conjunto de armadura pesada Antium. Para esta prueba, estos planos tienen algunas ranuras que aceptan diferentes materiales para variar los ajustes de estadisticas.\n\n\n~mission(Hint_Location) Para una lista completa de donde encontrar estos minerales, consulta <EM4>Fundamentos de Mineria #2: Donde Minar</EM4> en el Diario de tu mobiGlas. Ya que estas alli, puedes leer tambien la primera parte, <EM4>Fundamentos de Mineria #1: Descripcion General Basica</EM4>, si quieres refrescar como obtener los materiales.\n\nDado que esta es una orden de compra y no un contrato de mineria, se espera que proporciones tu propio equipo, como un <EM4>~mission(Hint_Tool)</EM4>.\n\nTen en cuenta que, para agilizar el uso futuro de estos materiales, <EM4>deben ser refinados antes de la entrega</EM4>. Esto puede hacerse en cualquier refineria, cuyas ubicaciones puedes encontrar en tu mapa estelar.\n\nUna vez que estes listo para vendernos los materiales refinados requeridos, depositalos en el elevador de carga ubicado en <EM4>~mission(Destination|Address)</EM4>.\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Arclight "Nightstalker"\n- Brazos Aril\n- Torso Aril\n- Piernas Aril\n- Casco Aril\n- Pistola Arclight "Warhawk"\n- Bateria de pistola Arclight (30 balas)\n
