recovery_desc=~mission(Contractor|RecoverItemDescription)\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Nyx, nyx, Nyx I</EM4>\n- Subfusil Custodian\n- Subfusil Custodian "Midnight"\n- Subfusil Custodian "Scorched"\n- Brazos Arden-SL\n- Torso Arden-SL\n- Piernas Arden-SL\n- Casco Arden-SL\n- Cargador de Subfusil Custodian (60 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Hurston, HUR L1, HUR L2</EM4>\n- Subfusil Lumin V\n- Torso Inquisitor Negro\n- Brazos Inquisitor Negro\n- Piernas Inquisitor Negro\n- Casco Morningstar Icefall\n- Torso Inquisitor Gris\n- Brazos Inquisitor Gris\n- Piernas Inquisitor Gris\n- Bateria de Subfusil Lumin V (45 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Nyx, nyx, Nyx I</EM4>\n- Escopeta R97 "Kismet"\n- Escopeta R97 "Righteous"\n- Brazos Monde Camuflaje Delta\n- Piernas Monde Camuflaje Delta\n- Torso Monde Camuflaje Delta\n- Casco Monde Camuflaje Delta\n- Casco Monde Daimyo\n- Piernas Monde Camuflaje Hemlock\n- Torso Monde Camuflaje Hemlock\n- Brazos Monde Camuflaje Hemlock\n- Cargador de Escopeta R97 (18 balas)\n
Headhunters_eliminateall_caves_desc_01=Hola, tenemos un grupo de matones de poca monta atrincherados en ~mission(location|address). Normalmente no les prestariamos atencion, pero estos arrogantes intentaron atacar un puesto bajo nuestra proteccion. Nuestros efectivos estan ocupados con amenazas mayores, asi que nos gustaria que te encargues de esto por nosotros.\n\nDirigete a ~mission(Location|CaveSize) y asegurate de que estos desgraciados sean eliminados. Con suerte, ya estaran tan adentrados en el subsuelo que no tendras que preocuparte por enterrarlos una vez que hayas terminado.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_eliminateall_outpost_desc_01=Algunos insensatos se niegan a saldar su deuda con nosotros. El problema es que han decidido hacerlo publico. Si hubieran mantenido las cosas en silencio, podriamos haber resuelto esto de manera mas discreta, pero ahora es necesario enviar un mensaje contundente. Queremos que todos sean eliminados. Ejecuta la tarea con la mayor firmeza posible. Tu pago sera enviado una vez que la situacion este completamente resuelta.\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Rustville</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Pistola Yubarev\n- Pistola Yubarev "Mirage"\n- Pistola Yubarev "Igniter"\n- Brazos DustUp Tactico\n- Torso DustUp Tactico\n- Piernas DustUp Tactico\n- Casco DustUp Tactico\n- Bateria de Pistola Yubarev (10 balas)\n
headhunters_defend_Generic_M_desc_001=Unos genios pensaron que seria buena idea intentar derribar uno de nuestros puestos en ~mission(Location|Address), asi que estamos organizando una respuesta para enterrarlos y tambien mostrarles a los demas que pasa si tocan territorio de Headhunters.\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
Headhunters_defend_XT_VH_desc_001=XenoThreat esta en pie de guerra. Han lanzado ataques simultaneos en varios sitios Headhunters y estirado nuestros combatientes delgada. Me han dicho que planean asaltar ~mission(location|address) y no podemos conseguir a nadie para defenderla. \nEstoy buscando a alguien que reuna un equipo, provisiones, y monte una fuerte defensa para nosotros. Voy a ser honesto contigo, esto se perfila como un infierno de lucha. Los Xenos estan enviando algunas de sus fuerzas mas experimentadas. No hay mucho mas que pueda decir, excepto que probablemente escalonaran la llegada de sus fuerzas, acabaran con todos y te pagaran generosamente. \n¿Crees que puedes estar a la altura de las circunstancias?  \n\n-Stows\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_defend_Generic_M_TheYard_desc_001=Poniendo el aviso. Tenemos un puesto de Headhunters cerca de ~mission(location|Address) bajo ataque y necesitamos refuerzos. Todavia no sabemos quien esta atacando, pero realmente no nos importa. Si te enfrentas a los Headhunters, preparate para recibir.\n\nLlega ahi de inmediato y acaba con ellos.\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_defend_Generic_M_WindFall_desc_001=Necesitamos algunos refuerzos en ~mission(Location|Address) para defender uno de nuestros puestos que esta siendo atacado. No sabemos quien busca una muerte temprana, pero lo averiguaremos cuando esten frios y quietos.\n\nLleva a mas gente si lo prefieres, pero asegurate de recuperarlo.\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_defend_Generic_M_Carvers_desc_001=Juro que todos los delincuentes locales se han vuelto mas audaces desde que Citizens for Prosperity se mudo aqui. Ahora tenemos a un grupo atacando uno de nuestros refugios cerca de ~mission(Location|Address), asi que necesito que alguien lo recupere y les recuerde que los Headhunters siguen siendo el poder en el sistema.\n\nSi los eliminas, no tengo que averiguar quienes son, asi que ponte a ello.\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_defend_Generic_M_GoldenRivera_desc_001=Llamado para cualquiera con ganas de causar algo de violencia. Unos idiotas pensaron que podian derribar nuestro puesto en Golden Riviera y que no hariamos nada al respecto. Ve y muestrales lo equivocados que estaban.\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
Headhunters_defend_XT_H_desc_001=No se si estas al tanto de lo que pasa en Pyro, pero actualmente estamos en una guerra territorial con XenoThreat. Ha sido bastante brutal Ãºltimamente, y acabo de enterarme de que XenoThreat esta a punto de atacar ~mission(location|address). El problema es que no puedo reunir a ningun Clips para que llegue a tiempo de defenderla, asi que necesito que lo hagas por nosotros. \nCoge tu equipo, reune a algunos amigos y llega al lugar tan rapido como puedas. A los xenos les gusta escalonar la llegada de sus tropas, asi que no gastes toda tu municion durante la defensa inicial, porque es muy probable que vengan mas. \nEvita que se apoderen del lugar y te pagare por las molestias.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_eliminateall_cfp_M_desc_001=Recibimos la orden del Juez para atacar el puesto de CFP en ~mission(Location|Address). La seguridad ahi ha sido menos que hospitalaria con algunos de los locales, asi que tienen que irse.\n\nPueden hablar mucho sobre traer seguridad, pero tienen armas y no dudan en usarlas.\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_eliminateall_cfp_E_desc_001=Necesito a alguien para eliminar un puesto de CFP en ~mission(Location|Address). Sus fuerzas de seguridad tomaron el puesto de un grupo de locales que llevaban años ahi. Les dieron una paliza de lo que escuche, asi que vinieron a los Headhunters pidiendo venganza.\n\nHazlo rapido y limpio.\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_eliminateall_Generic_M_desc_001=Escuche que un grupo de saqueadores de naves estan escondidos en un pequeño puesto cerca de ~mission(Location|Address). Robaron un par de naves de Headhunters hace unos meses despues de tirar a la tripulacion por la esclusa, asi que los hemos estado vigilando desde entonces.\n\nQuiero que vayas y les muestres la misma misericordia que ellos mostraron a nuestra gente. ¿Entendido?\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_eliminateall_XT_derelicts_desc_01=Uno de nuestros jueces se entero de Xenothreat tratando de mudarse en nuestro territorio. Parece que estan tratando de hacerse cargo de la mision ~ (ubicacion | direccion). No queremos dejar que esos psicos se pongan mas en el sistema de lo que ya lo han ellos duros. No cedan hasta que todo el lugar sea un cementerio. Enviaremos su pago una vez que los cuerpos esten listos para enterrar.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_EliminateAll_XenoThreat_H_desc_001=Uno de los nuestros se topo con un grupo de XenoThreat escondiendose en un puesto avanzado cerca de ~mission(Location|Address). No estamos seguros de si estan atrincherados o simplemente de paso, pero queremos golpear antes de que se muevan.\n\nQuizas trae algo de gente si puedes, porque XenoThreat no suele caer facilmente. Llega alli y recuerdales quien manda en este sistema.\n\nStows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
hh_killanimals_e_derelictoutpostscaves_desc_001=Los Headhunters necesitan a alguien para encargarse de un grupo de kopions que han estado molestando a nuestros chicos. Los vieron por ultima vez en ~mission(Location|address). Hay unos creditos para ti si haces el trabajo.\n\n-Stows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
hh_killanimals_m_derelictoutpostscaves_desc_001=Un grupo de kopions se instalo en territorio Headhunter. Malos. Tener que pelear con animales salvajes cada pocas horas esta dificultando los negocios. \n\nSi te encargas de ellos, te pagaremos. Hazlo como quieras, siempre que terminen muertos. \n\n-Stows\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
hh_killanimals_h_derelictoutpostscaves_desc_001=Una gran manada de kopions persiguio a uno de nuestros Clips el otro dia. Nunca encontramos el cuerpo. Dicen que se lo comieron. \n\nNecesitamos a alguien que vaya a ~mission(Location|address) y mate a todos los kopions que vea. No pares hasta que los bastardos esten todos muertos. \n\nCuida tu espalda cuando entres. Si no te has dado cuenta, estos cabrones son malos. Si te matan, es tu problema. \n\n-Stows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_eliminateall_base_Generic_E_desc_001=Asi esta la cosa: tenemos a unos pequeños delincuentes que creen que son algo grande operando desde una base cerca de ~mission(Location|Address). No se que basura toxica estan bebiendo, pero pensaron que seria buena idea enfrentarse a unos Headhunter Clips. Mataron a uno e hirieron a otros tres. Asi que quiero enviar a alguien para que les saque la ambicion del craneo.\n\nVe a ~mission(Location) y hazlo. Recibiras un buen pago por ello.\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Pistola Yubarev\n- Pistola Yubarev "Mirage"\n- Pistola Yubarev "Igniter"\n- Brazos DustUp Tactico\n- Torso DustUp Tactico\n- Piernas DustUp Tactico\n- Casco DustUp Tactico\n- Bateria de Pistola Yubarev (10 balas)\n
headhunters_eliminateall_retrievestolen_base_Generic_M_desc_001=Un grupo local decidio atacar uno de nuestros convoyes y robar nuestras cosas. Se escaparon, pero no vamos a dejarlos celebrar por mucho tiempo. Quiero que vayas a ~mission(Location|Address), donde tienen una base, los conviertas en cenizas y recuperes nuestras cosas.\n\nUna vez que tengas la carga, llevala a ~mission(Dropoff1|Address) y todos podemos olvidar que estos idiotas existieron alguna vez.\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Pistola Yubarev\n- Pistola Yubarev "Mirage"\n- Pistola Yubarev "Igniter"\n- Brazos DustUp Tactico\n- Torso DustUp Tactico\n- Piernas DustUp Tactico\n- Casco DustUp Tactico\n- Bateria de Pistola Yubarev (10 balas)\n
headhunters_eliminateall_retrievestolen_missingperson_base_Generic_M_desc_001=Uno de los Jueces locales ha estado intentando obtener informacion sobre algunas de las nuevas pandillas en la zona. Ya sabes, ver si alguien tiene la vista puesta en nosotros. Ese tipo de cosas. De todos modos, enviamos a ~mission(TargetName) de incognito para tratar de averiguar si alguien tiene ideas brillantes para intentar hacer un movimiento.\n\n~mission(TargetName|First) estaba yendo a una base cerca de ~mission(Location|Address) para hacer un trato con algunos matones locales o lo que sea, pero no hemos recibido noticias. El Juez teme que ~mission(TargetName|Last) haya sido descubierto y luego eliminado, asi que queremos que vayas ahi y veas que pasa.\n\nVe a ~mission(Location), intenta averiguar que paso con ~mission(TargetName|Last) y recupera nuestra carga. Lo mas probable es que necesites eliminar a cualquiera que encuentres porque si ~mission(TargetName|Last) esta muerto, estos idiotas mataron a un Headhunter.\n\nUna vez que tengas la carga, dejala en ~mission(Dropoff1|Address) y obten un buen pago.\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Pistola Yubarev\n- Pistola Yubarev "Mirage"\n- Pistola Yubarev "Igniter"\n- Brazos DustUp Tactico\n- Torso DustUp Tactico\n- Piernas DustUp Tactico\n- Casco DustUp Tactico\n- Bateria de Pistola Yubarev (10 balas)\n
headhunters_eliminateall_xt_desc_001=Es triste decirlo, pero perdimos uno de nuestros puestos ante XenoThreat. Patetico si me preguntas, pero por eso estamos buscando a alguien que tenga tiempo y municion para recuperarlo.\n\nSi eres tu, dirigete a ~mission(Location|Address) y recuperalo.\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Yubarev\n- Pistola Yubarev "Mirage"\n- Pistola Yubarev "Igniter"\n- Brazos DustUp Tactico\n- Torso DustUp Tactico\n- Piernas DustUp Tactico\n- Casco DustUp Tactico\n- Bateria de Pistola Yubarev (10 balas)\n
headhunters_eliminateall_cfp_desc_001=Asi esta la cosa. Algunos de esos mercenarios que CFP contrato como seguridad dispararon contra unos Headhunters que solo estaban pasando por el sistema. Ni siquiera estaban haciendo nada, solo volando.\n\nDe todos modos, los rastreamos hasta un puesto en ~mission(Location|Address) y queremos devolverles el golpe. Prepara tu equipo y se nuestra arma, te compensaremos bien por ello.\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Yubarev\n- Pistola Yubarev "Mirage"\n- Pistola Yubarev "Igniter"\n- Brazos DustUp Tactico\n- Torso DustUp Tactico\n- Piernas DustUp Tactico\n- Casco DustUp Tactico\n- Bateria de Pistola Yubarev (10 balas)\n
headhunters_defend_xt_desc_001=Esos imbeciles de XenoThreat lanzaron un ataque contra uno de nuestros puestos en ~mission(Location|Address), asi que buscamos gente que los detenga. Ve ahi y elimina a cada XenoThreat que veas.\n\n-Stows fuera\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Yubarev\n- Pistola Yubarev "Mirage"\n- Pistola Yubarev "Igniter"\n- Brazos DustUp Tactico\n- Torso DustUp Tactico\n- Piernas DustUp Tactico\n- Casco DustUp Tactico\n- Bateria de Pistola Yubarev (10 balas)\n
headhunters_ChainElimAll_AttackCFP_E_desc_001=Buscando a alguien con ganas de apretar el gatillo. Estamos planeando movernos contra un gran puesto avanzado de CFP en ~mission(Location|Address) y tomarlo para nosotros. Pero tendras que ser inteligente. Hay un monton de puestos avanzados satelite alrededor del principal y todos tienen seguridad, asi que deberias eliminarlos antes de tomar la base principal.\n\nPero oye, si quieres saltar directamente a la parte dificil y enfrentarte a todos los refuerzos, eso es cosa tuya. Mientras lo hagas, todo bien.\n\nStows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Yubarev\n- Pistola Yubarev "Mirage"\n- Pistola Yubarev "Igniter"\n- Brazos DustUp Tactico\n- Torso DustUp Tactico\n- Piernas DustUp Tactico\n- Casco DustUp Tactico\n- Bateria de Pistola Yubarev (10 balas)\n
headhunters_ChainElimAll_AttackGen_E_desc_001=Buscando a algunos ejecutores para llevar algo de violencia a unos idiotas locales que han estado haciendo trabajos en el sistema contra los Headhunters. Intentamos hablar con ellos para explicarles su error, pero dispararon a nuestro mensajero, asi que ahora vamos con la opcion B.\n\nLos encontraras atrincherados en un puesto avanzado cerca de ~mission(Location|Address). Ve alli y pinta las paredes con su sangre.\n\nDiviertete.\n\nStows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Yubarev\n- Pistola Yubarev "Mirage"\n- Pistola Yubarev "Igniter"\n- Brazos DustUp Tactico\n- Torso DustUp Tactico\n- Piernas DustUp Tactico\n- Casco DustUp Tactico\n- Bateria de Pistola Yubarev (10 balas)\n
headhunters_ChainElimAll_1C_AttackXT_M_desc_001=Acabo de recibir autorizacion de mi juez para contraatacar a XenoThreat. He estado vigilando un pequeño grupo de puestos avanzados bajo su control cerca de ~mission(Location|Address).\n\nTe dare los objetivos, eliminas a todos los que encuentres. Diablos, me encantaria ir yo mismo, suena divertido.\n\n-Stows\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_ChainElimAll_1C_AttackCFP_E_desc_001=Hemos recibido informacion de que la seguridad de CFP se esta volviendo mas agresiva y han comenzado a expulsar a personas de los hogares que construyeron con chatarra en el sistema. Quieren venganza, asi que acudieron a nosotros.\n\nDirigete a ~mission(Location|Address) y elimina los puestos avanzados. Deberia ser bastante simple y con una buena paga.\n\nStows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_ChainElimAll_1C_ElimSpec_AttackCFP_M_desc_001=Hemos intentado llevarnos bien con estos Citizens for Prosperity, pero han dejado claro que no hay lugar para nosotros en su "sistema seguro". Su uso de mercenarios para la seguridad ha causado todo tipo de violencia irrazonable. Recientemente, este imbecil ~mission(TargetName) abrio fuego contra un grupo de colonos para expulsarlos de un puesto avanzado que tenian en la mira. Asi que se acabaron los guantes.\n\nNecesito trabajadores duros para derribar el puesto avanzado de CFP en ~mission(Location|Address) y eliminar a ~mission(TargetName|Last). Es probable que permanezcan ocultos hasta que demuestres ser una amenaza lo suficientemente grande, asi que asegurate de causar daño.\n\nStows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_ChainElimAll_2C_ElimSpec_AttackCFP_H_desc_001=El consejo quiere que recuperemos algunos de los puestos avanzados que CFP ha ocupado. Estan un poco molestos de que esten obteniendo tanto terreno en el sistema y piensan que esta haciendo que los Headhunters parezcan debiles.\n\nEncontre un par de grupos de puestos avanzados de CFP cerca de ~mission(Location|Address) que podrian necesitar una limpieza. La guinda del pastel es que el jefe de seguridad alli es ~mission(TargetName). No estoy seguro de si has oido hablar de ellos, pero dispararon a un puñado de Clips el mes pasado, asi que es un ganar-ganar. Recupera algo de territorio y golpea a alguien que realmente merece ser eliminado.\n\nStows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_ChainElimAll_3C_ElimSpec_AttackCFP_VH_desc_001=Tenemos una grande aqui. Necesitamos un equipo para eliminar un monton de puestos avanzados de CFP cerca de ~mission(Location|Address). Se dice que CFP esta atrincherado en tres clusters diferentes en el area. Nuestro juez quiere que se limpien todos. Parece que uno de sus mercenarios, un verdadero imbecil llamado ~mission(TargetName), esta atrincherado en uno de ellos. Queremos que vayas alli, los elimines a todos y te encargues de ~mission(TargetName|Last).\n\nConsigue un buen dia de pago en el proceso.\n\nStows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_ChainElimAll_2C_ElimSpec_AttackXT_H_desc_001=Necesitamos algunos buenos soldados con gusto por la violencia para atacar algunos escondites de XenoThreat ubicados alrededor de ~mission(Location|Address). Te dare los detalles si estas interesado, pero tendras que limpiar dos grupos separados de escondites.\n\nTambien recibimos noticias de que ~mission(TargetName) esta merodeando por ahi. Si eliminas a suficientes XenoThreat, levantaran la cabeza.\n\nCuando lo hagan, ponles una bala.\n\nStows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_ChainElimAll_3C_ElimSpec_AttackXT_VH_desc_001=Tenemos un encargo jugoso para cualquier ejecutor experimentado que quiera un gran dia de pago y destrozar a algunos inutiles de XenoThreat. Hay un puesto avanzado conocido de XenoThreat ubicado en ~mission(Location|Address) que esta dirigido por un verdadero bastardo llamado ~mission(TargetName). Si has estado en el sistema el tiempo suficiente, probablemente hayas oido hablar de ~mission(TargetName|Last) o al menos hayas visto su trabajo. Este imbecil suele dejar cuerpos alla donde va.\n\nDe todos modos, el Consejo quiere que esta area quede completamente limpia, eso significa que debes golpear los tres clusters y matar a cada XenoThreat que encuentres. Mata suficientes y ~mission(TargetName|Last) no podra esconderse.\n\nAcabalos todos y tomate una a nuestra salud.\n\nStows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n
headhunters_ChainElimAll_Boss_XenoThreat_VH_desc_001=Estos imbeciles de XenoThreat son como aloprats. Cada vez que piensas que los eliminaste, simplemente vuelven a aparecer. Parece que estan tramando algo grande otra vez. No tengo idea de que, pero sera un desastre, asi que tenemos autorizacion para detenerlo antes de que comience.\n\nUn grupo de cabecillas de XenoThreat supuestamente se estan reuniendo en ~mission(location|address) para planear o simplemente desquitarse o lo que sea que hagan, pero vamos a interrumpirlo. O tu lo haras.\n\nDirigete a ~mission(location) y elimina a todos los que encuentres. Seguro que los cabecillas saltaran al combate. Siempre lo hacen.\n\nEsto sera dificil. Aunque odio a XenoThreat, son bastante buenos en una pelea, asi que cuidate y trae ayuda si puedes.\n\nStows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- Fusil de Francotirador Atzkav\n- Fusil de Francotirador Atzkav "Igniter"\n- Fusil de Francotirador Atzkav "Mirage"\n- Brazos Calico Tactico\n- Torso Calico Tactico\n- Piernas Calico Tactico\n- Casco Calico Tactico\n- Bateria de Fusil de Francotirador Atzkav (8 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Pistola Yubarev\n- Pistola Yubarev "Mirage"\n- Pistola Yubarev "Igniter"\n- Brazos DustUp Tactico\n- Torso DustUp Tactico\n- Piernas DustUp Tactico\n- Casco DustUp Tactico\n- Bateria de Pistola Yubarev (10 balas)\n
headhunters_EliminateSpecific_Asteroid_Generic_M_desc_001=Necesito que alguien se encargue de un objetivo. Esta escondido en una base de asteroides cerca de ~mission(Location|address). No se si te interesa quien es, pero se llama ~mission(TargetName). No hay mucho que decir, un maton local que mato a alguien con conexiones.\n\nHa estado huyendo, asi que estara nervioso. Me acercaria con precaucion.\n\nStows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta Doble Ravager-212\n- Subfusil Ripper "Sunblock"\n- Brazos Armadura Dust Devil\n- Torso Armadura Dust Devil\n- Piernas Armadura Dust Devil\n- Casco Manticore\n- Cargador de Escopeta Doble Ravager-212 (16 balas)\n- Cargador de Escopeta Deadrig (8 balas)\n
headhunters_EliminateSpecific_Generic_E_desc_001=Buscando a alguien disponible para un trabajo rapido. Tenemos un puesto cerca de ~mission(Location|address) que esta siendo atacado por unos genios liderados por ~mission(TargetName). Ya hemos tenido encuentros con ~mission(TargetName|Last) antes, asi que no sorprende que no hayan aprendido.\n\nQueremos que vayas alla y los elimines. Mata a quien quieras, pero ~mission(TargetName|Last) debe ser tu enfoque.\n\n-Stows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Rustville, Slowburn Depot</EM4>\n- Fusil de Francotirador Scalpel\n- Pistola Coda\n- Pistola Coda "Nighthawk"\n- Pistola Coda "Big Boss"\n- Brazos Morozov-SH\n- Torso Morozov-SH\n- Piernas Morozov-SH\n- Casco Morozov-SH\n- Cargador de Fusil de Francotirador Scalpel (12 balas)\n- Cargador de Pistola Coda (6 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Escopeta Devastator\n- Escopeta Devastator "Warhawk"\n- Escopeta Devastator "Midnight"\n- Torso Morozov-SH Thule\n- Brazos Morozov-SH Thule\n- Piernas Morozov-SH Thule\n- Casco Morozov-SH Thule\n- Bateria de Escopeta Devastator (12 balas)\n
headhunters_EliminateSpecific_Generic_M_desc_001=Tenemos una banda que ha estado atacando naves de los Headhunters ultimamente. Su lider es un verdadero problema llamado ~mission(TargetName). Los hemos rastreado hasta ~mission(Location|address), asi que buscamos a alguien que los elimine de una vez por todas.\n\nEste grupo le gusta pelear, pero no deberia ser problema para alguien como tu.\n\nVe alli y haz el trabajo.\n\n-Stows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Scalpel\n- Pistola Coda\n- Pistola Coda "Nighthawk"\n- Pistola Coda "Big Boss"\n- Brazos Morozov-SH\n- Torso Morozov-SH\n- Piernas Morozov-SH\n- Casco Morozov-SH\n- Cargador de Fusil de Francotirador Scalpel (12 balas)\n- Cargador de Pistola Coda (6 balas)\n
headhunters_EliminateSpecific_CFP_M_desc_001=Necesito un gatillero disponible para eliminar un objetivo en un puesto avanzado de CFP. Es un verdadero pedazo de trabajo llamado ~mission(TargetName). Un mercenario de la vieja escuela lleno de crueldad.\n\nEscuche que esta ubicado en ~mission(Location|address). Pasa por ahi y eliminalo. Trata de no causar demasiado daño. Ellos son el objetivo, nadie mas.\n\nStows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- Fusil de Francotirador Scalpel\n- Pistola Coda\n- Pistola Coda "Nighthawk"\n- Pistola Coda "Big Boss"\n- Brazos Morozov-SH\n- Torso Morozov-SH\n- Piernas Morozov-SH\n- Casco Morozov-SH\n- Cargador de Fusil de Francotirador Scalpel (12 balas)\n- Cargador de Pistola Coda (6 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Escopeta Devastator\n- Escopeta Devastator "Warhawk"\n- Escopeta Devastator "Midnight"\n- Torso Morozov-SH Thule\n- Brazos Morozov-SH Thule\n- Piernas Morozov-SH Thule\n- Casco Morozov-SH Thule\n- Bateria de Escopeta Devastator (12 balas)\n
headhunters_EliminateSpecific_Generic_VH_desc_001=Mis jefes me han informado que estamos saldando cuentas antiguas. Tengo una pista sobre un antiguo asesino llamado ~mission(TargetName) que ha acumulado una lista de asesinatos considerable. Nos enteramos de que se estan escondiendo con algunas personas en ~mission(Location|address), quienes no son precisamente fans nuestros, asi que probablemente no te reciban bien. ~mission(TargetName|Last) es el objetivo aqui, pero podrias tener que enfrentarte a otros.\n\nDe nuevo, siempre que hemos intentado eliminar a ~mission(TargetName|Last), ha matado a quien lo intento. Creo que te ira mejor, pero lleva refuerzos si puedes.\n\nBuena suerte.\n\n-Stows\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Scalpel\n- Pistola Coda\n- Pistola Coda "Nighthawk"\n- Pistola Coda "Big Boss"\n- Brazos Morozov-SH\n- Torso Morozov-SH\n- Piernas Morozov-SH\n- Casco Morozov-SH\n- Cargador de Fusil de Francotirador Scalpel (12 balas)\n- Cargador de Pistola Coda (6 balas)\n
headhunters_EliminateSpecific_Defector_desc_001=Esto me entristece. No se si alguna vez te cruzaste con ~mission(TargetName) en tus tratos con nosotros. Pense que era de los buenos. Llevaba años con los Headhunters, pero algo debio pasar porque corrio a buscar proteccion con CFP, traicionando a algunos de nuestros hermanos y hermanas en el proceso.\n\nEl Consejo esta furioso y quiere sangre. Ahi entras tu. Ve a ~mission(Location|address), encuentralo y matalo.\n\nNo tiene que ser nada elegante. Solo queremos el resultado.\n\nUna verdadera lastima.\n\n-Stows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta Devastator\n- Escopeta Devastator "Warhawk"\n- Escopeta Devastator "Midnight"\n- Torso Morozov-SH Thule\n- Brazos Morozov-SH Thule\n- Piernas Morozov-SH Thule\n- Casco Morozov-SH Thule\n- Bateria de Escopeta Devastator (12 balas)\n
headhunters_EliminateSpecific_XenoThreat_desc_001=Tenemos una pista sobre un miembro de XenoThreat que ha sido una verdadera molestia. No se si has oido el nombre, pero ~mission(TargetName) es un imbecil incluso para los estandares de XenoThreat. Vicioso, sadico y un idiota en general. Queremos a alguien que acabe con ellos. ¿Te interesa?\n\nLa ultima informacion es que estaban en algun lugar cerca de ~mission(Location|address). Ve alli y eliminalos. Bastante simple.\n\n-Stows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta Devastator\n- Escopeta Devastator "Warhawk"\n- Escopeta Devastator "Midnight"\n- Torso Morozov-SH Thule\n- Brazos Morozov-SH Thule\n- Piernas Morozov-SH Thule\n- Casco Morozov-SH Thule\n- Bateria de Escopeta Devastator (12 balas)\n
headhunters_EliminateSpecific_TheYard_XenoThreat_H_desc_001=No se si te enteraste, pero ~mission(Location|address) esta siendo atacado por XenoThreat. La situacion no es buena, pero esta bajo control. Aqui esta el trato, los idiotas que atacan estan liderados por un verdadero desperdicio llamado ~mission(TargetName). Ya hemos lidiado con ~mission(TargetName|Last) antes, pero siempre se escabullen antes de que podamos acabar con ellos.\n\nEso cambia ahora. Queremos que vayas alli y elimines a ~mission(TargetName|Last) antes de que vuelvan a escurrirse.\n\n-Stows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Scalpel\n- Pistola Coda\n- Pistola Coda "Nighthawk"\n- Pistola Coda "Big Boss"\n- Brazos Morozov-SH\n- Torso Morozov-SH\n- Piernas Morozov-SH\n- Casco Morozov-SH\n- Cargador de Fusil de Francotirador Scalpel (12 balas)\n- Cargador de Pistola Coda (6 balas)\n
headhunters_EliminateSpecific_Windfall_XenoThreat_H_desc_001=Estamos enfrentandonos a unos idiotas de XenoThreat en ~mission(Location|address) y descubrimos que ~mission(TargetName) los lidera. Se lo mencione a mi Juez y se emociono con la oportunidad de acabar con este imbecil, asi que queremos que vayas y te asegures de que no salgan vivos de este ataque.\n\n-Stows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Scalpel\n- Pistola Coda\n- Pistola Coda "Nighthawk"\n- Pistola Coda "Big Boss"\n- Brazos Morozov-SH\n- Torso Morozov-SH\n- Piernas Morozov-SH\n- Casco Morozov-SH\n- Cargador de Fusil de Francotirador Scalpel (12 balas)\n- Cargador de Pistola Coda (6 balas)\n
headhunters_EliminateSpecific_Carvers_XenoThreat_H_desc_001=Tenemos a algunas personas en ~mission(Location|address) soportando un asalto de XenoThreat. Eso apesta, claro, pero resulta que esta brindando una oportunidad para vengarnos. Esos idiotas de XenoThreat estan liderados por ~mission(TargetName), quien lleva semanas en la lista negra de mi jefe.\n\nQuiero que vayas alla y lo elimines.\n\n-Stows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Scalpel\n- Pistola Coda\n- Pistola Coda "Nighthawk"\n- Pistola Coda "Big Boss"\n- Brazos Morozov-SH\n- Torso Morozov-SH\n- Piernas Morozov-SH\n- Casco Morozov-SH\n- Cargador de Fusil de Francotirador Scalpel (12 balas)\n- Cargador de Pistola Coda (6 balas)\n
headhunters_EliminateSpecific_Riviera_XenoThreat_VH_desc_001=Tenemos una situacion en ~mission(Location|address). Uno de nuestros puestos esta siendo atacado por XenoThreat. Aunque apesta, tambien nos brinda una oportunidad interesante. El ataque esta siendo liderado por ~mission(TargetName), quien ha estado en la lista negra de los Headhunters desde hace tiempo.\n\nQueremos que vayas alli y los elimines. Sientete libre de matar a otros idiotas de XenoThreat, pero ~mission(TargetName|Last) es el objetivo. Mucha gente lo ha intentado antes, asi que definitivamente no sera facil. Incluso recomendaria llevar amigos, lo que sea necesario para finalmente acabar con ~mission(TargetName|Last).\n\n-Stows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Scalpel\n- Pistola Coda\n- Pistola Coda "Nighthawk"\n- Pistola Coda "Big Boss"\n- Brazos Morozov-SH\n- Torso Morozov-SH\n- Piernas Morozov-SH\n- Casco Morozov-SH\n- Cargador de Fusil de Francotirador Scalpel (12 balas)\n- Cargador de Pistola Coda (6 balas)\n
headhunters_EliminateSpecific_CFP_E_desc_001=Mi jefe esta buscando un ejecutor disponible. Los Headhunters estan buscando recuperar un puesto avanzado de CFP cerca de ~mission(Location|address). Los mercenarios alli se han estado preparando para una pelea larga. Mira, no queremos matar a nadie si no es necesario, asi que estamos buscando otras opciones.\n\nLa seguridad esta dirigida por ~mission(TargetName), y mi juez piensa\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Scalpel\n- Pistola Coda\n- Pistola Coda "Nighthawk"\n- Pistola Coda "Big Boss"\n- Brazos Morozov-SH\n- Torso Morozov-SH\n- Piernas Morozov-SH\n- Casco Morozov-SH\n- Cargador de Fusil de Francotirador Scalpel (12 balas)\n- Cargador de Pistola Coda (6 balas)\n
headhunters_EliminateSpecific_XenoThreat_VH_desc_001=Aqui esta el trato, acabamos de recibir informacion de que un pez gordo de XenoThreat llamado ~mission(TargetName) acaba de salir de su escondite y fue visto en ~mission(Location|address).\n\nLos Headhunters han estado ansiosos por enterrar a este imbecil durante meses, asi que lanzamos un asalto contra el puesto avanzado, pero el Consejo quiere asegurarse de que ~mission(TargetName|Last) no se escape, asi que quieren usarte como seguro.\n\nEsto sera un asesinato dificil en medio de una zona de guerra, pero te pagaremos si lo logras.\n\n-Stows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Scalpel\n- Pistola Coda\n- Pistola Coda "Nighthawk"\n- Pistola Coda "Big Boss"\n- Brazos Morozov-SH\n- Torso Morozov-SH\n- Piernas Morozov-SH\n- Casco Morozov-SH\n- Cargador de Fusil de Francotirador Scalpel (12 balas)\n- Cargador de Pistola Coda (6 balas)\n
headhunters_EliminateSpecific_XenoThreat_H_desc_001=Los Headhunters acaban de reunir a un grupo para atacar un puesto avanzado de XenoThreat en ~mission(Location|address), pero estoy buscando añadir algo de seguridad extra. Veras, hay un peso pesado alli llamado ~mission(TargetName) que esta alto en la estructura de mando de XenoThreat, y queremos que lo elimines. Cualquier otro que mates es un bono, pero ellos son tu objetivo principal.\n\n-Stows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Scalpel\n- Pistola Coda\n- Pistola Coda "Nighthawk"\n- Pistola Coda "Big Boss"\n- Brazos Morozov-SH\n- Torso Morozov-SH\n- Piernas Morozov-SH\n- Casco Morozov-SH\n- Cargador de Fusil de Francotirador Scalpel (12 balas)\n- Cargador de Pistola Coda (6 balas)\n
headhunters_EliminateSpecific_Asteroid_Generic_VE_desc_001=Recibimos informacion sobre un grupo que ha estado haciendo trabajos y construyendo una reputacion por si mismos. Como dijeron que no quieren nada con los Headhunters, estamos buscando desmantelarlos antes de que se conviertan en un problema. Su lider es un tal ~mission(TargetName), y pensamos que si encuentran el lado equivocado de una bala, el resto del grupo se desmoronara.\n\nSe nos dice que puedes encontrar a ~mission(TargetName|Last) en una base de asteroides alrededor de ~mission(Location|address). Ve y encargate de ello.\n\nNo deberian representar un problema para un profesional como tu.\n\nStows fuera.\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- Fusil de Francotirador Scalpel\n- Pistola Coda\n- Pistola Coda "Nighthawk"\n- Pistola Coda "Big Boss"\n- Brazos Morozov-SH\n- Torso Morozov-SH\n- Piernas Morozov-SH\n- Casco Morozov-SH\n- Cargador de Fusil de Francotirador Scalpel (12 balas)\n- Cargador de Pistola Coda (6 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Escopeta Devastator\n- Escopeta Devastator "Warhawk"\n- Escopeta Devastator "Midnight"\n- Torso Morozov-SH Thule\n- Brazos Morozov-SH Thule\n- Piernas Morozov-SH Thule\n- Casco Morozov-SH Thule\n- Bateria de Escopeta Devastator (12 balas)\n
headhunters_EliminateSpecific_CFP_H_desc_001=Los Headhunters estan lanzando un ataque contra un puesto avanzado de CFP cerca de ~mission(Location|address). Los mercenarios alli han estado despejando campamentos cercanos si no entregan sus armas. Estan liderados por este imbecil exmarine llamado ~mission(TargetName).\n\nAunque todos los miembros de seguridad estan autorizados como objetivos, ~mission(TargetName|Last) ha sido destacado. En su ultima redada, golpearon a un ocupante ilegal hasta la muerte por responderles. Resulta que ese ocupante era primo de uno de nuestros Clips, asi que estan pagando extra para asegurarse de que se haga justicia.\n\nCuidate, sin embargo. ~mission(TargetName|Last) puede ser un desgraciado que se merece esto, pero sigue siendo exmilitar, asi que no sera facil derribarlo.\n\n-Stows\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta Devastator\n- Escopeta Devastator "Warhawk"\n- Escopeta Devastator "Midnight"\n- Torso Morozov-SH Thule\n- Brazos Morozov-SH Thule\n- Piernas Morozov-SH Thule\n- Casco Morozov-SH Thule\n- Bateria de Escopeta Devastator (12 balas)\n
vaughn_assassination_FPS_UGF_illegal_desc_001=Dicen que no hay honor entre los ladrones. Hoy parece que estas apuntando a uno de los tuyos. \n\nPor favor, dirigete a ~mission(Location|Address) y mata a ~mission(TargetName). Lo que hagas con los demas depende totalmente de ti.\n\nSinceramente,\nVaughn\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Killshot\n- Escopeta Deadrig\n- Brazos Overlord Supernova\n- Torso Overlord Supernova\n- Piernas Overlord Supernova\n- Casco Overlord Supernova\n- Brazos Armadura Piecemeal\n- Torso Armadura Piecemeal\n- Piernas Armadura Piecemeal\n- Casco Badami\n- Cargador de Fusil Killshot (45 balas)\n- Cargador de Escopeta Deadrig (8 balas)\n
Vaughn_EliminateSpecific_FPS_storm_H_desc_001=Me han encargado eliminar a un objetivo para un cliente muy motivado. El objetivo es <EM4>~mission(TargetName)</EM4>, un personaje detestable que disfruta de la autoridad temporal que le da su posicion mercenaria. Cree que su sadismo es justo y mi cliente quiere recordarle lo contrario.\n\nRecientemente fue contratado por ASD como parte de un equipo mercenario en <EM4>~mission(Location)</EM4>, asi que no sera facil ya que habra otros individuos armados. ~mission(TargetName|Last) es tu objetivo.\n\nSe te pagara al completar el trabajo.\n\nSaludos,\n\nVaughn\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Killshot\n- Escopeta Deadrig\n- Brazos Overlord Supernova\n- Torso Overlord Supernova\n- Piernas Overlord Supernova\n- Casco Overlord Supernova\n- Brazos Armadura Piecemeal\n- Torso Armadura Piecemeal\n- Piernas Armadura Piecemeal\n- Casco Badami\n- Cargador de Fusil Killshot (45 balas)\n- Cargador de Escopeta Deadrig (8 balas)\n
Vaughn_EliminateSpecific_FPS_Rockcracker_Power_desc_001=Una solicitud ha llegado a mi escritorio sobre el fin inoportuno de ~mission(TargetName), un miembro de las Salamandras Garra que actualmente merodea por una antigua Estacion QV Breaker.\n\nEs muy probable que lo encuentres en ~mission(Location|Address). Ten en cuenta, sin embargo, que con una estacion tan grande puede requerir algo de busqueda para dar con ellos.\n\nEspero que disfrutes tu tiempo en Nyx,\nVaughn\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
Vaughn_EliminateSpecific_FPS_Rockcracker_Warehouse_desc_001=Hay un miembro de la banda de Nyx, las Salamandras Garra, ~mission(TargetName), que se ha ganado un lugar en mi lista de malos. Habian estado huyendo durante bastante tiempo, pero recientemente reaparecieron en una antigua estacion minera en el Cinturon Keeger. Nuestro dia de suerte sera el ultimo de ellos.\n\nSe dice que puedes encontrarlos en ~mission(Location|Address). Desafortunadamente, hay una alta probabilidad de que tengas que hacer algunas reparaciones en la estacion antes de poder acceder a esa area en particular.\n\nPero estoy seguro de que estas mas que preparado para el desafio.\n\nAtentamente,\nVaughn\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
Vaughn_EliminateSpecific_FPS_Rockcracker_Maintenance_desc_001=He tenido dificultades para localizar a este objetivo. Son parte de una banda conocida como las Salamandras Garra que tienden a ser bastante itinerantes. Sin embargo, parece que el grupo ha estado intentando poner en funcionamiento una antigua Estacion QV Breaker de nuevo y creo que esta puede ser la oportunidad para eliminar a ~mission(TargetName) de una vez por todas.\n\nComienza tu busqueda en ~mission(Location|Address). Estas estaciones aparentemente pueden ser bastante cavernosas a veces, asi que puede requerir algo de esfuerzo localizar al objetivo una vez que estes en el lugar.\n\nSin embargo, tengo toda la confianza en tus habilidades,\nVaughn\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
vaughn_assassination_FPS_UGF_legal_boss_desc_001=Un alto funcionario de seguridad llamado ~mission(TargetName) esta a punto de que su larga carrera llegue a un final muy violento y repentino. Mientras que actualmente se encuentran en ~mission(Location|Address), no sera facil llegar a ellos. Me temo que sera necesario un poco de trabajo para sacarlos. \n\nRecomiendo matar a suficientes subordinados para que se vean obligados a enfrentarte personalmente. Por supuesto, una vez que finalmente decidan dar la cara, deberia ser un asunto bastante sencillo. \n\nAtentamente,\nVaughn\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- LMG Pulverizer\n- Pistola Tripledown\n- Brazos Citadel Base\n- Piernas Citadel Base\n- Torso Citadel Base\n- Casco Fortifier Base\n- Torso Armadura Carnifex\n- Piernas Armadura Carnifex\n- Cargador de LMG Pulverizer (120 balas)\n- Cargador de Pistola Tripledown (12 balas)\n
vaughn_assassination_FPS_UGF_illegal_boss_desc_001=No estoy seguro de que conozcas ~mission(Location|Address), pero ~mission(TargetName) es quien lleva la voz cantante alli. Necesito que los eliminen. Me temo que es mas facil decirlo que hacerlo. Son notoriamente reacios a ocuparse de los asuntos personalmente, prefiriendo que sus subordinados hagan el trabajo sucio. Dicho esto, elimina a suficientes subordinados y no tendran mas remedio que tratar contigo ellos mismos.\n\nSinceramente,\nVaughn\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- LMG Pulverizer\n- Pistola Tripledown\n- Brazos Citadel Base\n- Piernas Citadel Base\n- Torso Citadel Base\n- Casco Fortifier Base\n- Torso Armadura Carnifex\n- Piernas Armadura Carnifex\n- Cargador de LMG Pulverizer (120 balas)\n- Cargador de Pistola Tripledown (12 balas)\n
Vaughn_EliminateBoss_FPS_Rockcracker_Warehouse_desc_001=Uno de los lideres de la misteriosa banda de las Salamandras Garra, ~mission(TargetName), ha agotado su bienvenida y ahora es nuestro problema resolverlo. No es una sorpresa, ya que nadie excepto sus amigos podia entender lo que decian.\n\nDesafortunadamente, no sera tan facil como ir a ~mission(Location|Address) y enfrentarlos directamente. No solo tendras que asegurarte de que la estacion este operativa para alcanzarlos, sino que parece que tendras que sacarlos de su escondite tambien, eliminando primero a un buen numero de sus compinches.\n\nNo es el trabajo mas simple, pero estoy seguro de que estaras a la altura.\n\nSaludos,\nVaughn\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Escopeta R97 "Scorched"\n- Brazos Monde Daimyo\n- Torso Monde Daimyo\n- Piernas Monde Daimyo\n- Casco Monde Daimyo\n- Brazos Monde Camuflaje Crimson\n- Torso Monde Camuflaje Crimson\n- Piernas Monde Camuflaje Crimson\n- Casco Monde Camuflaje Crimson\n- Cargador de Escopeta R97 (18 balas)\n
bhg_bounty_desc_ASD_Research_001=--------------------------------------------------------\n----------------- CONTRATO DE CAZA RECOMPENSAS -----------------\n--------------------------------------------------------\n\nGUILD DE CAZARRECOMPENSAS\nPROCESAMIENTO Y DISTRIBUCION\n\nLa Guild de Cazarrecompensas ha autorizado una recompensa oficial.\n\nNOMBRE: ~mission(TargetName) \nSISTEMA: Stanton\nEVALUACION DE RIESGO: Medio\nULTIMA UBICACION CONOCIDA: ~mission(Location|Direccion)\nAFILIACIONES CONOCIDAS: <Ninguna>\nNOTAS: Hemos rastreado a este objetivo hasta el <EM4>ala de Investigacion</EM4> de una instalacion abandonada de Associated Science and Development. Aunque clausurada, se sabe que varios saqueadores y otros tipos indeseables frecuentan la zona.\n\nLa instalacion en si tambien podria representar un riesgo, ya que se desconoce la naturaleza de la investigacion que se realizaba alli. Este atento a posibles peligros ambientales mientras persigue al objetivo.\n\n\nGUILD DE CAZARRECOMPENSAS\nEn Busca de la Justicia\n\nLa Guild de Cazarrecompensas es un servicio de seguridad sancionado por la Guild Mercenaria y autorizado para operar tanto en la UEE como mas alla segun los Actos de Autoridad Xenotrade.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Palatino Metropolis\n- Torso Palatino Metropolis\n- Piernas Palatino Metropolis\n- Casco Palatino Metropolis\n- Brazos Palatino Daystar\n- Torso Palatino Daystar\n- Piernas Palatino Sunstone\n- Casco Palatino Daystar\n
bhg_bounty_desc_ASD_Engineering_001=--------------------------------------------------------\n----------------- CONTRATO DE CAZA RECOMPENSAS -----------------\n--------------------------------------------------------\n\nGUILD DE CAZARRECOMPENSAS\nPROCESAMIENTO Y DISTRIBUCION\n\nLa Guild de Cazarrecompensas ha autorizado una recompensa oficial.\n\nNOMBRE: ~mission(TargetName) \nSISTEMA: Stanton\nEVALUACION DE RIESGO: Medio\nULTIMA UBICACION CONOCIDA: ~mission(Location|Direccion)\nAFILIACIONES CONOCIDAS: <Ninguna>\nNOTAS: Hemos rastreado a este objetivo hasta el <EM4>ala de Ingenieria</EM4> de una instalacion de investigacion abandonada de Associated Science and Development. Aunque clausurada, se sabe que varios saqueadores y otros tipos indeseables frecuentan la zona.\n\nLa instalacion en si tambien podria representar un riesgo, ya que se desconoce la naturaleza de la investigacion que se realizaba alli. Este atento a posibles peligros ambientales mientras persigue al objetivo.\n\n\nGUILD DE CAZARRECOMPENSAS\nEn Busca de la Justicia\n\nLa Guild de Cazarrecompensas es un servicio de seguridad sancionado por la Guild Mercenaria y autorizado para operar tanto en la UEE como mas alla segun los Actos de Autoridad Xenotrade.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Palatino Sunstone\n- Torso Palatino Sunstone\n- Piernas Palatino Sunstone\n- Casco Palatino Sunstone\n
bhg_bounty_desc_Rockcracker_Zone1_001=--------------------------------------------------------\n----------------- CONTRATO DE CAZARECOMPENSAS -----------------\n--------------------------------------------------------\n\nGREMI0 DE CAZARECOMPENSAS\nPROCESAMIENTO Y DISTRIBUCION\n\nEl Gremio de Cazarrecompensas ha autorizado una recompensa oficial.\n\nNOMBRE: ~mission(TargetName)\nSISTEMA: Nyx\nEVALUACION DE RIESGO: Medio\nULTIMA UBICACION CONOCIDA: ~mission(Location|Address)\nAFILIACIONES CONOCIDAS: Salamandras Garra\nNOTAS: Estas antiguas y abandonadas Estaciones QV Breaker deben abordarse con precaucion. No solo estan en un estado de deterioro significativo, sino que frecuentemente estan habitadas por fauna peligrosa y forajidos, como los miembros de la banda asociados al objetivo.\n\n\nGREMIO DE CAZARECOMPENSAS\nEn Busca de Justicia\n\nEl Gremio de Cazarrecompensas es un servicio de seguridad sancionado por el Gremio de Mercenarios y autorizado para operar tanto en la UEE como mas alla, de acuerdo con las Actas de Autoridad de Xenocomercio.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
bhg_bounty_desc_Rockcracker_Zone2_001=--------------------------------------------------------\n----------------- CONTRATO DE CAZARECOMPENSAS -----------------\n--------------------------------------------------------\n\nGREMI0 DE CAZARECOMPENSAS\nPROCESAMIENTO Y DISTRIBUCION\n\nEl Gremio de Cazarrecompensas ha autorizado una recompensa oficial.\n\nNOMBRE: ~mission(TargetName)\nSISTEMA: Nyx\nEVALUACION DE RIESGO: Medio\nULTIMA UBICACION CONOCIDA: ~mission(Location|Address)\nAFILIACIONES CONOCIDAS: Salamandras Garra\nNOTAS: Estas antiguas y abandonadas Estaciones QV Breaker deben abordarse con precaucion. No solo estan en un estado de deterioro significativo, sino que frecuentemente estan habitadas por fauna peligrosa y forajidos, como los miembros de la banda asociados al objetivo.\n\n\nGREMIO DE CAZARECOMPENSAS\nEn Busca de Justicia\n\nEl Gremio de Cazarrecompensas es un servicio de seguridad sancionado por el Gremio de Mercenarios y autorizado para operar tanto en la UEE como mas alla, de acuerdo con las Actas de Autoridad de Xenocomercio.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
bhg_bounty_desc_Rockcracker_Power_001=--------------------------------------------------------\n----------------- CONTRATO DE CAZARECOMPENSAS -----------------\n--------------------------------------------------------\n\nGREMI0 DE CAZARECOMPENSAS\nPROCESAMIENTO Y DISTRIBUCION\n\nEl Gremio de Cazarrecompensas ha autorizado una recompensa oficial.\n\nNOMBRE: ~mission(TargetName)\nSISTEMA: Nyx\nEVALUACION DE RIESGO: Medio\nULTIMA UBICACION CONOCIDA: ~mission(Location|Address)\nAFILIACIONES CONOCIDAS: Salamandras Garra\nNOTAS: Estas antiguas y abandonadas Estaciones QV Breaker deben abordarse con precaucion. No solo estan en un estado de deterioro significativo, sino que frecuentemente estan habitadas por fauna peligrosa y forajidos, como los miembros de la banda asociados al objetivo.\n\n\nGREMIO DE CAZARECOMPENSAS\nEn Busca de Justicia\n\nEl Gremio de Cazarrecompensas es un servicio de seguridad sancionado por el Gremio de Mercenarios y autorizado para operar tanto en la UEE como mas alla, de acuerdo con las Actas de Autoridad de Xenocomercio.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
bhg_EliminateBoss_FPS_Rockcracker_Warehouse_desc_001=--------------------------------------------------------\n----------------- CONTRATO DE CAZARECOMPENSAS -----------------\n--------------------------------------------------------\n\nGREMI0 DE CAZARECOMPENSAS\nPROCESAMIENTO Y DISTRIBUCION\n\nEl Gremio de Cazarrecompensas ha autorizado una recompensa oficial.\n\nNOMBRE: ~mission(TargetName)\nSISTEMA: Nyx\nEVALUACION DE RIESGO: Alto\nULTIMA UBICACION CONOCIDA: ~mission(Location|Address)\nAFILIACIONES CONOCIDAS: Salamandras Garra\nNOTAS: Debido a que estas estaciones QV Breaker abandonadas no son completamente funcionales, hay una buena probabilidad de que tengas que realizar algunas reparaciones antes de poder acceder a la ubicacion del objetivo. Tambien puede que tengas que enfrentarte a otros peligros como fauna peligrosa.\n\nAdicionalmente, la inteligencia recopilada sobre ~mission(TargetName) los situa como un miembro de alto rango de las Salamandras Garra, alguien que no aparecera a menos que sea convenientemente sacado de su escondite. Enfrentate a suficientes de sus asociados de rango inferior y se vera obligado a venir a enfrentarse a ti personalmente.\n\n\nGREMIO DE CAZARECOMPENSAS\nEn Busca de Justicia\n\nEl Gremio de Cazarrecompensas es un servicio de seguridad sancionado por el Gremio de Mercenarios y autorizado para operar tanto en la UEE como mas alla, de acuerdo con las Actas de Autoridad de Xenocomercio.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Escopeta R97 "Scorched"\n- Brazos Monde Daimyo\n- Torso Monde Daimyo\n- Piernas Monde Daimyo\n- Casco Monde Daimyo\n- Brazos Monde Camuflaje Crimson\n- Torso Monde Camuflaje Crimson\n- Piernas Monde Camuflaje Crimson\n- Casco Monde Camuflaje Crimson\n- Cargador de Escopeta R97 (18 balas)\n
cfp_defendship_multi_VHRT_desc_001=Un convoy de Citizens for Prosperity en una mision de reabastecimiento activo una baliza de auxilio cerca de <EM4>~mission(Location|Address)</EM4>. No responden a ninguna comunicacion, asi que asumo que la situacion es grave. Ese convoy tiene algunos pilotos habilidosos, asi que si no responden, definitivamente necesitan ayuda.\n\nTe compensaremos por apoyar a ese convoy.\n\nLima Endicott\nDespachadora Principal\nCitizens for Prosperity\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
cfp_defendship_multi_SRT_desc_001=Estoy recibiendo informes de que un convoy de Citizens for Prosperity que transporta suministros vitales esta actualmente bajo ataque en <EM4>~mission(Location|Address)</EM4>. Seria un gran golpe para nuestras operaciones si perdieramos esa carga.\n\nSi tienes las habilidades de combate para enfrentarte a hostiles altamente agresivos, estamos mas que dispuestos a pagar por tu ayuda.\n\nLima Endicott\nDespachadora Principal\nCitizens for Prosperity\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
