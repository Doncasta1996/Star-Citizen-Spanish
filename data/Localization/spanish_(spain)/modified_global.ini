cfp_sabotage_servers_M_HH_desc_001="Destruye los servidores de los Headhunters en ~mission(Location|Address).\n\nGracias,\n \nLima Endicott\nJefe de expedicion\nCitizens for Prosperity"\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- LMG FS-9\n- Escopeta BR-2\n- Fusil Gallant\n- Brazos ADP Bosque\n- Torso ADP\n- Piernas ADP Bosque\n- Casco Balor HCH\n- Brazos ADP-mk4 Bosque\n- Piernas ADP-mk4 Bosque\n- Torso ADP-mk4 Bosque\n- Casco ADP-mk4 Bosque\n- Cargador de LMG FS-9 (75 balas)\n- Cargador de Escopeta BR-2 (12 balas)\n- Bateria de Fusil Gallant (45 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Fusil de Francotirador P6-LR\n- Fusil de Francotirador A03\n- Casco CBH-3 Base\n- Brazos PAB-1\n- Torso PAB-1\n- Piernas PAB-1\n- Brazos TrueDef-Pro\n- Torso TrueDef-Pro Base\n- Casco Argus\n- Piernas TrueDef-Pro\n- Cargador de Fusil de Francotirador A03 (15 balas)\n- Cargador de Fusil de Francotirador P6-LR (8 balas)\n
cfp_sabotage_generators_M_desc_001=Hemos recibido informacion de que los forajidos en ~mission(Location|Address) han comenzado a reclutar con la esperanza de lanzar un ataque contra Citizens for Prosperity.\n\nPara desescalar la situacion antes de que se salga de control, nos gustaria que deshabilitaras sus generadores de energia y detengas su expansion.\n\nSi logras esto, podrias salvar muchas vidas.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- LMG FS-9\n- Escopeta BR-2\n- Fusil Gallant\n- Brazos ADP Bosque\n- Torso ADP\n- Piernas ADP Bosque\n- Casco Balor HCH\n- Brazos ADP-mk4 Bosque\n- Piernas ADP-mk4 Bosque\n- Torso ADP-mk4 Bosque\n- Casco ADP-mk4 Bosque\n- Cargador de LMG FS-9 (75 balas)\n- Cargador de Escopeta BR-2 (12 balas)\n- Bateria de Fusil Gallant (45 balas)\n
cfp_sabotage_generators_H_desc_001=Hay un grupo de forajidos en ~mission(Location|Address) que se ha convertido cada vez mas en un problema para los asentamientos de Citizens for Prosperity en el sector.\n\nAunque la violencia directa contra los perpetradores podria ser efectiva, no esta en el espiritu de nuestra mision aqui. En cambio, nos gustaria que desconectaras los generadores cercanos a su bastion. Esto deberia limitar su capacidad operativa mientras se preservan vidas.\n\nMe gusta pensar que los forajidos de hoy son los ciudadanos productivos del mañana.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- LMG FS-9\n- Escopeta BR-2\n- Fusil Gallant\n- Brazos ADP Bosque\n- Torso ADP\n- Piernas ADP Bosque\n- Casco Balor HCH\n- Brazos ADP-mk4 Bosque\n- Piernas ADP-mk4 Bosque\n- Torso ADP-mk4 Bosque\n- Casco ADP-mk4 Bosque\n- Cargador de LMG FS-9 (75 balas)\n- Cargador de Escopeta BR-2 (12 balas)\n- Bateria de Fusil Gallant (45 balas)\n
cfp_sabotage_VH_desc_001="Destruye los servidores en ~mission(Location|Address).\n\nGracias,\n \nLima Endicott\nJefe de expedicion\nCitizens for Prosperity"\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- LMG FS-9\n- Escopeta BR-2\n- Fusil Gallant\n- Brazos ADP Bosque\n- Torso ADP\n- Piernas ADP Bosque\n- Casco Balor HCH\n- Brazos ADP-mk4 Bosque\n- Piernas ADP-mk4 Bosque\n- Torso ADP-mk4 Bosque\n- Casco ADP-mk4 Bosque\n- Cargador de LMG FS-9 (75 balas)\n- Cargador de Escopeta BR-2 (12 balas)\n- Bateria de Fusil Gallant (45 balas)\n
cfp_sabotage_generators_E_HH_desc_001=Con la reciente agresion perpetrada por los Headhunters contra nuestra gente, Citizens for Prosperity ha estado organizando una operacion completa que, con suerte, les causara un golpe significativo.\n\nSin embargo, antes de que eso pueda suceder, necesitamos ganar algo mas de tiempo para finalizar nuestros preparativos. Si pudieras destruir los generadores de energia en ~mission(Location|Address), esto deberia frenar a los Headhunters el tiempo suficiente para que podamos estar listos.\n\nTu asistencia sera critica para nuestro exito,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador P6-LR\n- Fusil de Francotirador A03\n- Casco CBH-3 Base\n- Brazos PAB-1\n- Torso PAB-1\n- Piernas PAB-1\n- Brazos TrueDef-Pro\n- Torso TrueDef-Pro Base\n- Casco Argus\n- Piernas TrueDef-Pro\n- Cargador de Fusil de Francotirador A03 (15 balas)\n- Cargador de Fusil de Francotirador P6-LR (8 balas)\n
cfp_sabotage_servers_H_XT_desc_001="Destruye los servidores de XenoThreat cerca de ~mission(Location|Address).\n\nGracias,\n \nLima Endicott\nJefe de expedicion\nCitizens for Prosperity"\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Bloom, PYR3 L1, PYR3 L2</EM4>\n- LMG FS-9\n- Escopeta BR-2\n- Fusil Gallant\n- Brazos ADP Bosque\n- Torso ADP\n- Piernas ADP Bosque\n- Casco Balor HCH\n- Brazos ADP-mk4 Bosque\n- Piernas ADP-mk4 Bosque\n- Torso ADP-mk4 Bosque\n- Casco ADP-mk4 Bosque\n- Cargador de LMG FS-9 (75 balas)\n- Cargador de Escopeta BR-2 (12 balas)\n- Bateria de Fusil Gallant (45 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Terminus, PYR6 L1, PYR6 L2</EM4>\n- Fusil de Francotirador P6-LR\n- Fusil de Francotirador A03\n- Casco CBH-3 Base\n- Brazos PAB-1\n- Torso PAB-1\n- Piernas PAB-1\n- Brazos TrueDef-Pro\n- Torso TrueDef-Pro Base\n- Casco Argus\n- Piernas TrueDef-Pro\n- Cargador de Fusil de Francotirador A03 (15 balas)\n- Cargador de Fusil de Francotirador P6-LR (8 balas)\n
cfp_sabotage_generators_VE_desc_001=Tras una serie de ataques contra los asentamientos alineados con Citizens for Prosperity, creemos haber rastreado a los responsables hasta ~mission(Location|Address).\n\nAtacarlos directamente supondria un gran riesgo y probablemente fomentaria represalias agresivas. En cambio, creemos que si sus generadores de energia se deshabilitan, podrian verse obligados a establecerse en otro lugar.\n\n¿Crees que puedes encargarte de esto por nosotros?\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- LMG FS-9\n- Escopeta BR-2\n- Fusil Gallant\n- Brazos ADP Bosque\n- Torso ADP\n- Piernas ADP Bosque\n- Casco Balor HCH\n- Brazos ADP-mk4 Bosque\n- Piernas ADP-mk4 Bosque\n- Torso ADP-mk4 Bosque\n- Casco ADP-mk4 Bosque\n- Cargador de LMG FS-9 (75 balas)\n- Cargador de Escopeta BR-2 (12 balas)\n- Bateria de Fusil Gallant (45 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Fusil de Francotirador P6-LR\n- Fusil de Francotirador A03\n- Casco CBH-3 Base\n- Brazos PAB-1\n- Torso PAB-1\n- Piernas PAB-1\n- Brazos TrueDef-Pro\n- Torso TrueDef-Pro Base\n- Casco Argus\n- Piernas TrueDef-Pro\n- Cargador de Fusil de Francotirador A03 (15 balas)\n- Cargador de Fusil de Francotirador P6-LR (8 balas)\n
cfp_bombingrun_E_desc_001=Hemos tenido problemas crecientes con los forajidos en ~mission(Location|Address) y ya no podemos quedarnos de brazos cruzados mientras sus acciones agresivas dañan a nuestra comunidad. \n\nNo estamos seguros de lanzar un asalto a gran escala, pero creemos que si eliminamos sus reservas de combustible, actuaria como un elemento disuasorio contra futuras acciones hostiles. \n\nSi puedes, agradeceriamos que te encargues personalmente de la destruccion del combustible. Probablemente una nave capaz de lanzar misiles seria lo mas adecuado, pero lo dejamos a tu criterio.\n\nGracias,\n \nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- LMG FS-9\n- Escopeta BR-2\n- Fusil Gallant\n- Brazos ADP Bosque\n- Torso ADP\n- Piernas ADP Bosque\n- Casco Balor HCH\n- Brazos ADP-mk4 Bosque\n- Piernas ADP-mk4 Bosque\n- Torso ADP-mk4 Bosque\n- Casco ADP-mk4 Bosque\n- Cargador de LMG FS-9 (75 balas)\n- Cargador de Escopeta BR-2 (12 balas)\n- Bateria de Fusil Gallant (45 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Fusil de Francotirador P6-LR\n- Fusil de Francotirador A03\n- Casco CBH-3 Base\n- Brazos PAB-1\n- Torso PAB-1\n- Piernas PAB-1\n- Brazos TrueDef-Pro\n- Torso TrueDef-Pro Base\n- Casco Argus\n- Piernas TrueDef-Pro\n- Cargador de Fusil de Francotirador A03 (15 balas)\n- Cargador de Fusil de Francotirador P6-LR (8 balas)\n
cfp_sabotage_drugs_M_desc_001=Citizens for Prosperity ha estado trabajando arduamente para mejorar la vida de las personas en todo el sistema, pero una tarea ya dificil se vuelve casi imposible cuando las drogas estan involucradas. Recientemente hemos visto a un distribuidor apuntando especificamente a nuestros mas vulnerables y hemos sufrido retrocesos en todos los aspectos. Esto debe detenerse.\n\nNos gustaria que vayas a ~mission(Location|Address) y pongas un fin permanente a su linea de produccion.\n\nHaz esto y con suerte podremos encaminar a nuestra gente nuevamente.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- LMG FS-9\n- Escopeta BR-2\n- Fusil Gallant\n- Brazos ADP Bosque\n- Torso ADP\n- Piernas ADP Bosque\n- Casco Balor HCH\n- Brazos ADP-mk4 Bosque\n- Piernas ADP-mk4 Bosque\n- Torso ADP-mk4 Bosque\n- Casco ADP-mk4 Bosque\n- Cargador de LMG FS-9 (75 balas)\n- Cargador de Escopeta BR-2 (12 balas)\n- Bateria de Fusil Gallant (45 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Fusil de Francotirador P6-LR\n- Fusil de Francotirador A03\n- Casco CBH-3 Base\n- Brazos PAB-1\n- Torso PAB-1\n- Piernas PAB-1\n- Brazos TrueDef-Pro\n- Torso TrueDef-Pro Base\n- Casco Argus\n- Piernas TrueDef-Pro\n- Cargador de Fusil de Francotirador A03 (15 balas)\n- Cargador de Fusil de Francotirador P6-LR (8 balas)\n
cfp_sabotage_servers_E_HH_desc_001=Con creciente frecuencia, los miembros de la banda Headhunters han estado atacando asentamientos de Citizens for Prosperity cuando nuestras patrullas estan demasiado lejos para ofrecer asistencia. \n\nPara lograr esto, han estado utilizando informacion recopilada sobre nosotros que esta almacenada en ~mission(Location|Address). Al destruir estos servidores y la informacion que contienen, deberiamos poder limitar significativamente la capacidad de los Headhunters para moverse contra nosotros.\n\nGracias por tu ayuda,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- LMG FS-9\n- Escopeta BR-2\n- Fusil Gallant\n- Brazos ADP Bosque\n- Torso ADP\n- Piernas ADP Bosque\n- Casco Balor HCH\n- Brazos ADP-mk4 Bosque\n- Piernas ADP-mk4 Bosque\n- Torso ADP-mk4 Bosque\n- Casco ADP-mk4 Bosque\n- Cargador de LMG FS-9 (75 balas)\n- Cargador de Escopeta BR-2 (12 balas)\n- Bateria de Fusil Gallant (45 balas)\n
