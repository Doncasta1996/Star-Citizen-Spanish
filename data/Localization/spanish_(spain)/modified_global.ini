Foxwell_HaulCargo_MultiToSingle_desc_01=Algo extraño esta sucediendo en las antiguas instalaciones mineras Hathor. Tanto las plataformas de alineacion como los laseres orbitales llevan decadas abandonados y acumulando polvo, pero los forajidos han comenzado a usarlos como base de operaciones.\n\nNos ha contratado una parte interesada que recientemente perdio mucha carga importante a manos de una de estas bandas. Actualmente, sus cosas estan almacenadas en <EM4>~mission(Location1|Address)</EM4> y <EM4>~mission(Location2|Address)</EM4>, pero existe un temor creciente de que la banda pueda estar vendiendo la mercancia pronto. Por eso nos han contratado para asaltar ambas instalaciones Hathor, recuperar la carga de los ascensores de carga y llevarla al ascensor de carga en <EM4>~mission(Destination|Address)</EM4>.\n\nEstos son los detalles de lo que hay que recoger en cada ubicacion. No importa el orden en que lo hagas, siempre que todo sea recogido y entregado. Solo asegurate de traer una nave que pueda manejar <EM4>contenedores de ~mission(MissionMaxSCUSize)</EM4>. Tampoco estaria de mas que trajeras contigo un <EM4>handheld tractor beam</EM4>.\n\n~mission(MultiToSingleToken)\n\nFoxwell no ha podido explorar estas ubicaciones, pero si fuera tu, esperaria enfrentar una resistencia armada seria. Mejor trae un buen equipo y algunos amigos.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es un especialista en seguridad con fianza, autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, por favor contacta a uno de nuestros representantes de contratacion.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_HaulCargo_AToB_PAF_desc_01=Recientemente, una banda asalto un centro de distribucion y se llevo <EM4>~mission(CargoGradeToken) de carga</EM4>. Foxwell ha sido contratado para recuperar todos esos bienes. Estamos recibiendo informes de que estos forajidos usan antiguas instalaciones Hathor como casas de almacenamiento y creemos que los articulos robados estan actualmente en <EM4>~mission(Location|Address)</EM4>.\n\nSi estas interesado, necesitaras una nave que pueda manejar <EM4>contenedores de ~mission(MissionMaxSCUSize)</EM4>. Dudo que puedas entrar y salir de esa PAF sin ser detectado, asi que mejor ve preparado para despejar la ubicacion. Una vez seguro, recoge la mercancia del ascensor de carga y entregala al <EM4>ascensor de carga en ~mission(Destination|Address)</EM4>.\n\nTampoco estaria de mas que trajeras contigo un <EM4>handheld tractor beam</EM4>.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es un especialista en seguridad con fianza, autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, por favor contacta a uno de nuestros representantes de contratacion.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_HaulCargo_AToB_OLP_desc_01=Buscamos un contratista con las habilidades y la nave adecuadas para una mision importante. Forajidos emboscaron a una Hull C que transportaba un cargamento de <EM4>~mission(CargoGradeToken)</EM4> y se lo llevaron a <EM4>~mission(Location|Address)</EM4>. Nos han contratado para recuperarlo todo.\n\nLa carga esta almacenada en alguna parte de una instalacion Hathor en desuso. El lugar es grande y esta plagado de forajidos. Necesitamos a alguien que recupere la mercancia del ascensor de carga alli y la entregue toda de vuelta al <EM4>ascensor de carga en ~mission(Destination|Address)</EM4>. No creas que esto sera un paseo. Trae mucha municion y una nave que pueda manejar <EM4>contenedores de ~mission(MissionMaxSCUSize)</EM4>.\n\nTampoco estaria de mas que trajeras contigo un <EM4>handheld tractor beam</EM4>.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es un especialista en seguridad con fianza, autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, por favor contacta a uno de nuestros representantes de contratacion.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_ShipWaveAttack_ClearHostiles_Title_VE_001=Contrato Nivel Amarillo: Limpiar Grupo de Secuestradores de Naves\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax\n- Brazos Antium\n- Torso Antium\n- Piernas Antium\n- Casco Antium\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_ShipWaveAttack_ClearHostiles_Desc_E_001=Vale, esto podria ser un poco dificil de hacer por tu cuenta, asi que si tienes favores que pedir, podria ser bueno cobrar esos vales ahora. Hay un grupo de forajidos atacando naves de carga en todo este sector y se nos ha encargado limpiarlos.\n\nUna vez que tu tripulacion este lista, dirigete a ~mission(Location|Address) y elimina a los hostiles alli. Ahora, estos desgraciados son un poco astutos, asi que tienden a dividirse en grupos mas pequenos. Asegurate de esperar para eliminar a todos y cada uno de ellos.\n\nBuena suerte,\n\nMarcus Clenn\nFoxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad afianzado con licencia para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, comuniquense con uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax\n- Brazos Antium\n- Torso Antium\n- Piernas Antium\n- Casco Antium\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_ShipWaveAttack_ClearHostiles_Title_M_001=Contrato Nivel Naranja: Destruir Amenaza Forajida\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax\n- Brazos Antium\n- Torso Antium\n- Piernas Antium\n- Casco Antium\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_ShipWaveAttack_ClearHostiles_Desc_H_001=Parece que un par de bandas menores diferentes han decidido unir sus recursos y comenzar a hacer ataques coordinados. Solos, no eran gran cosa, pero todos juntos estan demostrando ser una amenaza seria que debe ser tratada.\n\nRecluta algun refuerzo en quien puedas confiar y vuela a ~mission(Location|Address). Una vez que ataques a los miembros iniciales de la banda que encuentres alli, los otros grupos llegaran para apoyarlos. Asegurate de esperar para eliminar a todos ellos.\n\nBuena suerte,\n\nMarcus Clenn\nFoxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad afianzado con licencia para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, comuniquense con uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax\n- Brazos Antium\n- Torso Antium\n- Piernas Antium\n- Casco Antium\n- Bateria de Fusil Parallax (80 balas)\n
Hockrow_FacilityDelve_P2M1_Repeat_desc=Agencia Hockrow \nExpediente #JD10285\nInvestigador principal: Arken Mallor\n\nActualizacion:\nNecesitamos los datos mas recientes de anomalias energeticas para compararlos con los anteriores. Cualquier diferencia podria ser util.\n\nAcciones:\nExplorar el ala de <EM4>Ingenieria</EM4> y <EM4>recuperar datos de Anomalias Energeticas</EM4> para entregar en <EM4>~mission(Destination|Direccion)</EM4>.\n\nNotas:\nPrecaucion ante hostiles.\n\nNave con hangar grande.\n\nAl entregar los datos, recibiras una <EM4>unidad segura ASD</EM4> en tu base.\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: microTech, MIC L1, MIC L2</EM4>\n- LMG de Energia Fresnel\n- Fusil de Francotirador Laser Zenith\n- Brazos Armadura Geist Bosque\n- Torso Armadura Geist Bosque\n- Piernas Armadura Geist Bosque\n- Casco Armadura Geist Bosque\n- Brazos Corbel Mire\n- Torso Corbel Mire\n- Piernas Corbel Mire\n- Casco Corbel Mire\n- Bateria de LMG de Energia Fresnel (165 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: microTech, MIC L1, MIC L2</EM4>\n- LMG de Energia Fresnel "Icebox"\n- Brazos Armadura Geist Rogue\n- Torso Armadura Geist Rogue\n- Piernas Armadura Geist Rogue\n- Casco Armadura Geist Rogue\n- Brazos Armadura Geist Whiteout\n- Torso Armadura Geist Whiteout\n- Piernas Armadura Geist Whiteout\n- Casco Armadura Geist Whiteout\n- Brazos Corbel Smolder\n- Torso Corbel Smolder\n- Piernas Corbel Smolder\n- Casco Corbel Smolder\n- Bateria de LMG de Energia Fresnel (165 balas)\n
Hockrow_FacilityDelve_P2M2_Repeat_desc=Agencia Hockrow \nExpediente #JD10285\nInvestigador principal: Arken Mallor\n\nActualizacion:\nPor precaucion, necesitamos ver si los sistemas de seguridad han detectado algo nuevo desde tu ultima entrega.\n\nAcciones:\nExplorar el ala de <EM4>Investigacion</EM4> y <EM4>recuperar datos de Seguridad</EM4> para entregar en <EM4>~mission(Destination|Direccion)</EM4>.\n\nNotas:\nPrecaucion ante hostiles.\n\nNave con hangar grande.\n\nRecibiras una <EM4>unidad segura ASD</EM4> al completar.\n\n\n\n<EM4>Planos potenciales</EM4>\n- LMG de Energia Fresnel "Rockfall"\n- Fusil de Francotirador Laser Zenith "Landslide"\n- Brazos Armadura Geist\n- Torso Armadura Geist\n- Piernas Armadura Geist\n- Casco Armadura Geist\n- Brazos Corbel Patina\n- Torso Corbel Patina\n- Piernas Corbel Patina\n- Casco Corbel Patina\n- Bateria de LMG de Energia Fresnel (165 balas)\n
Hockrow_FacilityDelve_P2M3_Repeat_desc=Agencia Hockrow \nExpediente #JD10285\nInvestigador principal: Arken Mallor\n\nActualizacion:\nPara evitar que la informacion se vuelva obsoleta, necesitamos los ultimos datos sismicos de Onyx.\n\nAcciones:\nExplorar el ala de <EM4>Investigacion</EM4> y <EM4>recuperar datos Sismicos</EM4> para entregar en <EM4>~mission(Destination|Direccion)</EM4>.\n\nNotas:\nPrecaucion ante hostiles.\n\nNave con hangar grande.\n\nRecibiras una <EM4>unidad segura ASD</EM4> al completar.\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador Laser Zenith "Thunderstrike"\n- Casco Armadura Geist Desierto\n- Brazos Armadura Geist Desierto\n- Torso Armadura Geist Desierto\n- Piernas Armadura Geist Desierto\n- Brazos Armadura Geist Whiteout\n- Torso Armadura Geist Whiteout\n- Piernas Armadura Geist Whiteout\n- Casco Armadura Geist Whiteout\n- Brazos Corbel Halcyon\n- Torso Corbel Halcyon\n- Piernas Corbel Halcyon\n- Casco Corbel Halcyon\n- \n- Bateria de Fusil de Francotirador Laser Zenith (22 balas)\n
Intersec_DefendShip_Desc_Easy_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx \nFuerzas Hostiles: Forajidos\nEspecificaciones del Equipo: Nave con capacidad de combate \nInformacion: Se requiere asistencia urgente para un operativo de InterSec que actualmente esta bajo fuego en <EM4>~mission(Location|Address)</EM4>.\n\nUn grupo de forajidos habia tomado cautivo a nuestro operativo con la intencion de extraer informacion sensible, pero milagrosamente logro escapar. Desafortunadamente, los forajidos que los persiguen ahora los tienen acorralados.\n\nDebido al numero de naves que los asaltan, estamos ofreciendo una compensacion adicional para acomodar el peligro anadido. Se recomienda encarecidamente <EM4>reclutar naves adicionales</EM4> para apoyarte en esta mision.\n\nRespetuosamente,   \n\nDeacon Tobin \nGerente de Operaciones \nInterSec Defense Solutions  \n\nEsta comunicacion consiste en informacion confidencial destinada unicamente al destinatario. Por favor, desechela si la recibe por error y notifique al remitente. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley de la UEE y del sistema cuando sea aplicable.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Pulse "Rouge"\n- Brazos Testudo Combustion\n- Torso Testudo Combustion\n- Piernas Testudo Combustion\n- Casco Testudo Combustion\n- Bateria de Pistola Laser Pulse (60 balas)\n
Intersec_DefendShip_Desc_Medium_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx \nFuerzas Hostiles: Forajidos\nEspecificaciones del Equipo: Naves con capacidad de combate\nInformacion: Un agente nuestro encubierto fue comprometido y ahora esta siendo perseguido por la banda de forajidos que habia infiltrado. Como tal, necesita extraccion inmediata en <EM4>~mission(Location|Address)</EM4>. \n\nUna vez en el lugar, enfrentate a todos los hostiles para proporcionar cobertura y que nuestro operativo pueda escapar via salto cuantico.\n\n<EM4>Trae refuerzos adicionales</EM4> y no subestimes a estos forajidos. Son violentos y estan motivados, por lo que es poco probable que se rindan pronto.\n\nRespetuosamente,\n\nDeacon Tobin \nGerente de Operaciones \nInterSec Defense Solutions  \n\nEsta comunicacion consiste en informacion confidencial destinada unicamente al destinatario. Por favor, desechela si la recibe por error y notifique al remitente. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley de la UEE y del sistema cuando sea aplicable.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Pulse "Rouge"\n- Brazos Testudo Combustion\n- Torso Testudo Combustion\n- Piernas Testudo Combustion\n- Casco Testudo Combustion\n- Bateria de Pistola Laser Pulse (60 balas)\n
Intersec_DefendShip_Desc_Hard_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx \nFuerzas Hostiles: Forajidos\nEspecificaciones del Equipo: Naves con capacidad de combate\nInformacion: Uno de nuestros pilotos esta siendo atacado en <EM4>~mission(Location|Address)</EM4> y necesita asistencia.\n\nEste operativo transporta informacion clave sobre un ataque coordinado contra infraestructura crucial de la UEE y es vital que pueda entregarnosla. Tu y cualquier <EM4>piloto confiable que puedas reclutar</EM4> tienen la tarea de protegerlo de los forajidos que lo persiguen el tiempo suficiente para que pueda escapar via salto cuantico.\n\nRespetuosamente,   \n\nDeacon Tobin \nGerente de Operaciones \nInterSec Defense Solutions  \n\nEsta comunicacion consiste en informacion confidencial destinada unicamente al destinatario. Por favor, desechela si la recibe por error y notifique al remitente. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley de la UEE y del sistema cuando sea aplicable.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Pulse "Rouge"\n- Brazos Testudo Combustion\n- Torso Testudo Combustion\n- Piernas Testudo Combustion\n- Casco Testudo Combustion\n- Bateria de Pistola Laser Pulse (60 balas)\n
Intersec_DefendShip_Vanduul_Desc_VeryHard_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx \nFuerzas Hostiles: Vanduul \nEspecificaciones del Equipo: Naves con capacidad de combate \nInformacion: Acabamos de perder contacto con un piloto que se enfrento a fuerzas Vanduul en <EM4>~mission(Location|Address)</EM4>.\n\nViaja a su ultima ubicacion conocida y, si sigue con vida, defiendelo el tiempo suficiente para asegurar su escape. Garantizar la seguridad del operativo es crucial, al igual que eliminar cualquier amenaza Vanduul para la UEE.\n\nEs muy probable que necesites un <EM4>grupo fuerte de naves</EM4> para neutralizar con exito a estos Vanduul.\n\nRespetuosamente,   \n\nDeacon Tobin \nGerente de Operaciones \nInterSec Defense Solutions  \n\nEsta comunicacion consiste en informacion confidencial destinada unicamente al destinatario. Por favor, desechela si la recibe por error y notifique al remitente. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley de la UEE y del sistema cuando sea aplicable.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Pulse "Rouge"\n- Brazos Testudo Combustion\n- Torso Testudo Combustion\n- Piernas Testudo Combustion\n- Casco Testudo Combustion\n- Bateria de Pistola Laser Pulse (60 balas)\n
Intersec_DefendShip_Vanduul_Desc_Super_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx\nFuerzas Hostiles: Vanduul\nEspecificaciones del Equipo: Nave con Capacidad de Combate\nBriefing: Un operador que trabaja con InterSec esta siendo atacado actualmente por naves Vanduul en <EM4>~mission(Location|Address)</EM4>. La probabilidad de que sobreviva por su cuenta es baja, por lo que buscamos un contratista dispuesto a proporcionar apoyo de combate.\n\nLos contratistas que acepten esta mision deben estar bien abastecidos y preparados para enfrentar la amenaza Vanduul de frente.\n\nRespetuosamente,\n\nDeacon Tobin\nGerente de Operaciones\nInterSec Defense Solutions\n\nEsta comunicacion consiste en informacion confidencial destinada unicamente al receptor. Por favor, desestimala si la recibes por error y notifica al remitente. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley del UEE y del sistema cuando sea aplicable.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Pulse "Rouge"\n- Brazos Testudo Combustion\n- Torso Testudo Combustion\n- Piernas Testudo Combustion\n- Casco Testudo Combustion\n- Bateria de Pistola Laser Pulse (60 balas)\n
Intersec_KillShip_Desc_Intro_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx\nFuerzas Hostiles: Forajidos\nEspecificaciones del Equipo: Naves con capacidad de combate\nInformacion: InterSec ha sido contratada para combatir el creciente numero de forajidos que usan Nyx como base de operaciones, con la intencion de atacar a los sistemas vecinos de la UEE.\n\nComo medida preventiva, te requerimos viajar a <EM4>~mission(Location|Address)</EM4> y eliminar al cabecilla <EM4>~mission(TargetName)</EM4> para disuadir su ataque planeado contra Stanton. Ellos y su tripulacion son altamente peligrosos y <EM4>se te recomienda traer un wingman</EM4> como apoyo.\n\nLos contratistas que demuestren ser confiables y competentes en la ejecucion de operaciones seran elegibles para futuras misiones con InterSec.\n\nRespetuosamente,\n\nDeacon Tobin\nGerente de Operaciones\nInterSec Defense Solutions\n\nEsta comunicacion consiste en una oferta no vinculante que, tras su aceptacion, puede ser rescindida inmediatamente por cualquiera de las partes sin previo aviso. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley del sistema cuando sea aplicable.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
Intersec_KillShip_Desc_Easy_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx\nFuerzas Hostiles: Forajidos\nEspecificaciones del Equipo: Naves con capacidad de combate\nInformacion: InterSec ha identificado a mas forajidos que estan planeando una operacion contra los intereses de la UEE desde el interior de Nyx. Tu mision sera neutralizar esta amenaza potencial antes de que puedan ejecutar sus planes.\n\nViaja a <EM4>~mission(Location|Address)</EM4> y elimina al lider de estos forajidos, <EM4>~mission(TargetName)</EM4> sin vacilar. Hemos detectado un numero reducido de naves, pero nuestros informes sugieren que son pilotos competentes - <EM4>se recomienda traer refuerzos.</EM4>\n\nRecuerda que eliminar a estos forajidos no solo sirve a la gente de Nyx, sino tambien a la UEE.\n\nRespetuosamente,\n\nDeacon Tobin\nGerente de Operaciones\nInterSec Defense Solutions\n\nEsta comunicacion consiste en una oferta no vinculante que, tras su aceptacion, puede ser rescindida inmediatamente por cualquiera de las partes sin previo aviso. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley del sistema cuando sea aplicable.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
Intersec_KillShip_Desc_Medium_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx\nFuerzas Hostiles: Forajidos\nEspecificaciones del Equipo: Naves con capacidad de combate\nInformacion: Aparentemente insatisfechos con sus ganancias en Nyx, un grupo de forajidos liderado por <EM4>~mission(TargetName)</EM4> ha estado planeando un ataque importante contra la UEE. Esto no puede permitirse que suceda.\n\nGracias al trabajo de nuestro equipo de Inteligencia, hemos podido localizarlos en <EM4>~mission(Location|Address)</EM4>.\n\nDirigete alla tan pronto como puedas y atacalos antes de que tengan la oportunidad de dejar el sistema. Basandonos en nuestro analisis estrategico, recomendamos que una <EM4>flota bien armada y habil</EM4> sera necesaria para la finalizacion exitosa de esta mision.\n\nRespetuosamente, \n\nDeacon Tobin \nGerente de Operaciones\nInterSec Defense Solutions  \n\nEsta comunicacion consiste en una oferta no vinculante que, tras su aceptacion, puede ser rescindida inmediatamente por cualquiera de las partes sin previo aviso. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley del sistema cuando sea aplicable.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
Intersec_KillShip_Desc_Hard_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx\nFuerzas Hostiles: Forajidos\nEspecificaciones del Equipo: Naves con capacidad de combate\nInformacion: InterSec requiere un contratista habil para eliminar a un grupo de criminales altamente peligrosos con base en Nyx que estan planeando un ataque coordinado contra un miembro prominente de la Armada de la UEE.\n\nHemos interceptado una pieza de inteligencia crucial que sugiere que un terrorista conocido bajo el nombre de <EM4>~mission(TargetName)</EM4> tiene la intencion de llevar a cabo este asesinato con la ayuda de elementos criminales locales.\n\nActualmente se encuentran en <EM4>~mission(Location|Address)</EM4>, lo que lo convierte en un momento ideal para atacar. Advertencia, estos forajidos son asesinos experimentados - se recomienda traer un <EM4>grupo de aliados confiables.</EM4>\n\nRespetuosamente, \n\nDeacon Tobin \nGerente de Operaciones\nInterSec Defense Solutions  \n\nEsta comunicacion consiste en una oferta no vinculante que, tras su aceptacion, puede ser rescindida inmediatamente por cualquiera de las partes sin previo aviso. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley del sistema cuando sea aplicable.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
Intersec_KillShip_Vanduul_Desc_VeryHard_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx\nFuerzas Hostiles: Vanduul\nEspecificaciones del Equipo: Naves con capacidad de combate\nInformacion: InterSec necesita un piloto de combate altamente calificado que pueda localizar y neutralizar un peligroso objetivo Vanduul.\n\nUno de nuestros operadores ha identificado una nave Vanduul operando en las inmediaciones de <EM4>~mission(Location|Address)</EM4>. Hemos recibido instrucciones estrictas de eliminar cualquier Vanduul avistado en los limites del espacio de la UEE, por temor a una invasion del territorio del Imperio.\n\nLleva contigo una <EM4>pequeña flota de pilotos competentes</EM4> para enfrentar y neutralizar al objetivo.\n\nRespetuosamente, \n\nDeacon Tobin \nGerente de Operaciones\nInterSec Defense Solutions  \n\nEsta comunicacion consiste en una oferta no vinculante que, tras su aceptacion, puede ser rescindida inmediatamente por cualquiera de las partes sin previo aviso. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley del sistema cuando sea aplicable.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
InterSec_KillShip_Vanduul_Desc_Super_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx\nFuerzas Hostiles: Vanduul\nEspecificaciones del Equipo: Nave con Capacidad de Combate\nBriefing: InterSec requiere los servicios de un piloto habilidoso que este preparado para ayudar a eliminar un peligroso objetivo Vanduul que ha estado involucrado en numerosos ataques.\n\nLas incursiones Vanduul han ido en aumento recientemente, representando una amenaza no solo para el sistema Nyx, sino para todo el UEE. Es imperativo responder a estos avistamientos de manera rapida y eficiente.\n\nRequerimos que vueles al ultimo avistamiento conocido de la nave Vanduul en <EM4>~mission(Location|Address)</EM4> y los elimines inmediatamente.\n\nLos pilotos Vanduul son altamente cualificados y extremadamente peligrosos. Enfrenta al enemigo inmediatamente y no vaciles – ellos no mostraran la misma misericordia.\n\nSe otorgara una compensacion proporcional al riesgo del contrato.\n\n\nRespetuosamente,\nDeacon Tobin\nGerente de Operaciones\nInterSec Defense Solutions\n\nEsta comunicacion consiste en una oferta no vinculante que, tras su aceptacion, puede ser terminada inmediatamente por cualquiera de las partes sin previo aviso. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley del sistema cuando sea aplicable.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
InterSec_SecurityPatrol_H_Desc_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx\nFuerzas Hostiles: Forajidos\nEspecificaciones del Equipo: Naves con Capacidad de Combate\nBriefing: InterSec ha recibido inteligencia de que forajidos planean lanzar un ataque contra un objetivo dentro del UEE. En un esfuerzo por evitar que esto suceda, necesitamos un contratista para patrullar un sector que creemos que estos forajidos estan usando para preparar su ataque.\n\nLa actividad forajida en este sector es mas alta de lo normal, por lo que InterSec recomienda que <EM4>traer refuerzos</EM4>. Cuando estes listo, despachate al <EM4>marcador de ubicacion</EM4> en tu HUD y escanea los puntos de ruta a lo largo del recorrido. Una vez que hayas confirmado que todo el sector esta despejado, el contratista principal recibira una bonificacion de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nRespetuosamente,\n\nDeacon Tobin\nGerente de Operaciones\nInterSec Defense Solutions\n\nEsta comunicacion consiste en una oferta no vinculante que, tras su aceptacion, puede ser terminada inmediatamente por cualquiera de las partes sin previo aviso. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley del sistema cuando sea aplicable.\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- Subfusil de Energia Quartz "Lumen"\n- Brazos Testudo Nightveil\n- Torso Testudo Nightveil\n- Piernas Testudo Nightveil\n- Casco Testudo Nightveil\n- \n- Subfusil de Energia Quartz "Deadfall"\n- Brazos Testudo Turfwar\n- Torso Testudo Turfwar\n- Piernas Testudo Turfwar\n- Casco Testudo Turfwar\n- Bateria de Subfusil de Energia Quartz (45 balas)\n
InterSec_SecurityPatrol_VH_desc_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx\nFuerzas Hostiles: Forajidos\nEspecificaciones del Equipo: Naves con Capacidad de Combate\nBriefing: InterSec ha estado rastreando un aumento en la actividad forajida en ciertos sectores del sistema. Esta actividad, en conjunto con otra inteligencia, nos lleva a creer que los forajidos estan planeando un ataque a elementos que viajan desde el UEE. Nuestro objetivo es patrullar estos sectores y interrumpir cualquier plan antes de que pueda llevarse a cabo.\n\nActualmente, necesitamos a alguien que pueda ayudar a patrullar un sector altamente peligroso. Una vez que hayas aceptado la mision, puedes proceder al <EM4>marcador de ubicacion</EM4> en tu HUD. Desde alli, te enviaremos a lo largo de una ruta especifica con puntos de ruta adicionales para escanear. Completa la patrulla y enviaremos al contratista principal una bonificacion de <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nDebido a la alta probabilidad de ataque y al nivel general de amenaza de los forajidos locales, recomendamos <EM4>recruiting trusted wingmen</EM4> para proporcionar apoyo de combate.\n\nRespetuosamente,\n\nDeacon Tobin\nGerente de Operaciones\nInterSec Defense Solutions\n\nEsta comunicacion consiste en una oferta no vinculante que, tras su aceptacion, puede ser terminada inmediatamente por cualquiera de las partes sin previo aviso. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley del sistema cuando sea aplicable.\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- Subfusil de Energia Quartz "Lumen"\n- Brazos Testudo Nightveil\n- Torso Testudo Nightveil\n- Piernas Testudo Nightveil\n- Casco Testudo Nightveil\n- \n- Subfusil de Energia Quartz "Deadfall"\n- Brazos Testudo Turfwar\n- Torso Testudo Turfwar\n- Piernas Testudo Turfwar\n- Casco Testudo Turfwar\n- Bateria de Subfusil de Energia Quartz (45 balas)\n
InterSec_SecurityPatrol_S_Desc_001=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx\nFuerzas Hostiles: Vanduul\nEspecificaciones del Equipo: Naves con Capacidad de Combate\nBriefing: Existe una creciente preocupacion de que los grupos de caza Vanduul se esten adentrando mas en Nyx. La primera linea de defensa contra esta intrusion son patrullas intensificadas. InterSec ha identificado un sector que ha experimentado un aumento en la actividad Vanduul y busca a alguien para patrullar la region y proporcionar una actualizacion.\n\nComenzaras tu patrulla en un <EM4>marcador de ubicacion</EM4> enviado a tu HUD y luego escanearas una serie de puntos de ruta a lo largo de una ruta designada. Las naves Vanduul en este sector son altamente habilidosas y agresivas, por lo que InterSec recomienda encarecidamente que <EM4>bring several combat-ready ships along as backup</EM4>.\n\nInterSec comprende el inmenso peligro al que estaras expuesto en esta patrulla, por lo que enviaremos una bonificacion especial de <EM4>~mission(ScripAmount) MG Scrip</EM4> al contratista principal una vez que el sector este despejado.\n\nRespetuosamente,\n\nDeacon Tobin\nGerente de Operaciones\nInterSec Defense Solutions\n\nEsta comunicacion consiste en una oferta no vinculante que, tras su aceptacion, puede ser terminada inmediatamente por cualquiera de las partes sin previo aviso. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley del sistema cuando sea aplicable.\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- Subfusil de Energia Quartz "Lumen"\n- Brazos Testudo Nightveil\n- Torso Testudo Nightveil\n- Piernas Testudo Nightveil\n- Casco Testudo Nightveil\n- \n- Subfusil de Energia Quartz "Deadfall"\n- Brazos Testudo Turfwar\n- Torso Testudo Turfwar\n- Piernas Testudo Turfwar\n- Casco Testudo Turfwar\n- Bateria de Subfusil de Energia Quartz (45 balas)\n
Kaboos_Mission_Description=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx\nFuerzas Hostiles: Forajidos presentes y armados\nEspecificaciones de Equipo: Nave Clasificada para Combate, Armas Personales\nInformacion: InterSec necesita tus servicios una vez mas.\n\nLa informacion que reuniste anteriormente ha sido invaluable para identificar varios compradores prominentes de las partes Vanduul obtenidas ilegalmente. Sin embargo, desde entonces Shattered Blade ha continuado sus operaciones y la UEE solicita que <EM4>actualicemos nuestra informacion.</EM4>\n\nCreemos que se puede recuperar mas informacion de las instalaciones de almacenamiento ubicadas en la antigua <EM4>estacion QV Logistics.</EM4>\n\nLos parametros de la operacion no han cambiado desde tu ultima mision: encuentra los <EM4>datos encriptados</EM4> y usa la <EM4>clave de descifrado</EM4> para descifrar y subirnos la lista. Shattered Blade habra reforzado el area desde la ultima vez, asi que espera resistencia.\n\nBuena suerte. Estaremos en contacto.\n\n\nRespetuosamente,\n\nDeacon Tobin\nGerente de Operaciones\nInterSec Defense Solutions\n\nEsta comunicacion consiste en informacion confidencial destinada unicamente al destinatario. Por favor, desestime si la recibe por error y notifique al remitente. Todas las operaciones se realizan bajo el propio riesgo personal del contratista y deben adherirse a la ley de la UEE y del sistema cuando sea aplicable.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Pulse "Blacklist"\n- Subfusil de Energia Quartz\n- Subfusil de Energia Quartz "Black Op"\n- Brazos Testudo\n- Torso Testudo\n- Piernas Testudo\n- Casco Testudo\n- Casco Testudo Clanguard\n- Torso Testudo Clanguard\n- Piernas Testudo Clanguard\n- Brazos Testudo Clanguard\n- Bateria de Subfusil de Energia Quartz (45 balas)\n- Bateria de Pistola Laser Pulse (60 balas)\n
InterSec_ResourceGathering_Cryopods_Desc=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx\nFuerzas Hostiles: Forajidos presentes y armados\nEspecificaciones de Equipo: <EM4>Nave con Capacidad de Carga</EM4>, Armas Personales, <EM4>Rayo tractor de Mano de Alta Resistencia</EM4>\nInformacion:\nNuestra inteligencia mas reciente muestra que los Shattered Blade han repuesto su stock de cadaveres Vanduul y pronto los transferiran de la antigua <EM4>estacion de QV Logistics</EM4> desde donde operan a un comprador interesado. La UEE no puede permitir otro incidente como el que ocurrio con ASD, por lo que estan ansiosos por que <EM4>recuperemos los criopods</EM4> y los entreguemos en <EM4>el elevador de carga en ~mission(Destination|Address)</EM4>.\n\nSi bien los miembros de Shattered Blade presentes en el sitio podrian ofrecer resistencia, no son el foco de tu mision. Trata con ellos segun sea necesario y obten los criopods.\n\nRespetuosamente,\n\nDeacon Tobin\nGerente de Operaciones\nInterSec Defense Solutions\n\nEsta comunicacion consiste en informacion confidencial destinada unicamente al receptor. Por favor, deseche si lo recibe por error y notifique al remitente. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley de la UEE y del sistema donde corresponda.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Laser Pulse\n- Brazos Testudo Earthshake\n- Torso Testudo Earthshake\n- Piernas Testudo Earthshake\n- Casco Testudo Earthshake\n- Bateria de Pistola Laser Pulse (60 balas)\n
InterSec_ResourceGathering_Tech_Desc=ESPECIFICACIONES DE LA MISION\n\nArea de Operaciones: Sistema Nyx\nFuerzas Hostiles: Forajidos presentes y armados\nEspecificaciones de Equipo: Nave Clasificada para Combate, Armas Personales\nInformacion:\nPara evitar que los Shattered Blade inunden el mercado negro con xenocontrabando, la UEE ha encargado a InterSec <EM4>recuperar un alijo de Blindaje y Metal Vanduul</EM4> de la antigua <EM4>estacion de QV Logistics</EM4> que la banda ha estado ocupando. Una vez que tengas los materiales en tu posesion, entregalos al elevador de carga en <EM4>~mission(Destination|Address)</EM4>.\n\nSiguiendo tu experiencia previa, no seria sorprendente si los Shattered Blade ofrecen resistencia, pero asegurate de que tu enfoque este en recuperar los materiales.\n\nRespetuosamente,\n\nDeacon Tobin\nGerente de Operaciones\nInterSec Defense Solutions\n\nEsta comunicacion consiste en informacion confidencial destinada unicamente al receptor. Por favor, deseche si lo recibe por error y notifique al remitente. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben adherirse a la ley de la UEE y del sistema donde corresponda.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Laser Pulse\n- Brazos Testudo Earthshake\n- Torso Testudo Earthshake\n- Piernas Testudo Earthshake\n- Casco Testudo Earthshake\n- Bateria de Pistola Laser Pulse (60 balas)\n
northrock_bounty_fps_UGF_boss_desc_001=Hola, \n\nTienes una recompensa interesante para ti. Un criminal de alto nivel por su nombre. ~mission(TargetName) ha sido ubicado en ~mission(Location|Address). \n\nSegun nuestra informacion, es muy poco probable que el objetivo este sentado esperando al aire libre. Lo mas probable es que tengas que infiltrarte en las instalaciones y sacarlos. \n\nAlgo como un gran tiroteo deberia ser suficiente para solucionar el problema.\n\nDETALLES DEL TRABAJO:\n• OBJETIVO: ~mission(TargetName) \n• LOCALIZACION: ~mission(Location|Address) \n\nMucha suerte,\n\nBraden Corchado\noficial de logistica - Sucursal Stanton\nNorthrock Service Group\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- LMG F55\n- Pistola LH86\n- Brazos Defiance Tactico\n- Torso Defiance Tactico\n- Piernas Defiance Tactico\n- Casco Defiance Tactico\n- Brazos Lynx\n- Piernas Lynx\n- Torso Lynx\n- Casco Oracle\n- Cargador de LMG F55 (150 balas)\n
northrock_bounty_fps_UGF_boss_nocivs_desc_001=Hola, \n\nTengo un contrato para ti que requiere un poco mas de tactica de lo habitual. Un criminal de alto nivel llamado ~mission(TargetName) se esconde con un gran contingente de forajidos en ~mission(Location|Address). \n\nNuestra informacion sugiere que ~mission(TargetName|Last) Lo mas probable es que sus fuerzas actuen como linea defensiva para proteger a su jefe. Mi mejor suposicion es que tendras que lidiar con ellos antes de obtener acceso a ~mission(TargetName|Last).\n\nDicho esto, no quiero que dispares indiscriminadamente. A veces, estos forajidos mantienen a civiles cerca y deben ser tratados como no combatientes.\n\nDETALLES DEL TRABAJO:\n• OBJETIVO: ~mission(TargetName) \n• LOCALIZACION: ~mission(Location|Address)\n\n\nBuena suerte,\n\nBraden Corchado\noficial de logistica - Sucursal de Stanton\nNorthrock Service Group\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- LMG F55\n- Pistola LH86\n- Brazos Defiance Tactico\n- Torso Defiance Tactico\n- Piernas Defiance Tactico\n- Casco Defiance Tactico\n- Brazos Lynx\n- Piernas Lynx\n- Torso Lynx\n- Casco Oracle\n- Cargador de LMG F55 (150 balas)\n
Foxwell_ShipAmbush_VE_desc_001=¿Te interesa ayudarnos a eliminar a un tipo malo?\n\nNos han contratado para cazar a un forajido que vuela un <EM4>~mission(AmbushTarget)</EM4>. No deberia ser demasiado dificil ya que toman la misma ruta de vuelo cada dia. Eso los convierte en un objetivo principal para una emboscada si alguna vez vi uno. He analizado la ruta y determinado que <EM4>~mission(Location|Address)</EM4> es el lugar ideal para atacar. Hay una nube de emision alli que sera perfecta para ocultar la firma de tu nave mientras esperas.\n\nEl trabajo es simple si estas interesado. Ve a la ubicacion, escondete, apaga los sistemas y luego espera a que pasen volando. A veces van solos pero a menudo tienen otras naves de un solo asiento con ellos. No deberia ser demasiado dificil de manejar para un profesional. Ademas, todavia tendremos refuerzos cerca y listos para desplegar una vez que comience.\n\nLogra esto y le daremos al contratista principal un pago adicional de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBuena suerte,\n\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es un especialista en seguridad con fianza autorizado para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, por favor contacta a uno de nuestros representantes de contratacion.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Sunstone"\n- Brazos Antium Jet\n- Torso Antium Jet\n- Piernas Antium Jet\n- Casco Antium Jet\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_ShipAmbush_E_desc_001=Un forajido que ha estado huyendo finalmente regreso al sistema. Parece que esperaba que desaparecer un tiempo nos haria olvidarlo. Ni siquiera intenta ocultar su identidad o variar su rutina, asi que sabemos exactamente donde estara.\n\nLos ultimos informes indican que pilota un <EM4>~mission(AmbushTarget)</EM4> y pasara por <EM4>~mission(Location|Address)</EM4> pronto. Ya identifique una nube de emision perfecta para cubrirte, apagar tu nave y esperar. La unica variable es si estara solo o no. Hemos oido que a veces va con amigos en naves de un solo piloto. El primer golpe sorpresa sera crucial, ya que esta tripulacion esta experimentada, pero tendremos refuerzos listos para apoyarte.\n\nSi lo logras, el contratista principal recibira <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, A Tu Manera'\n\nFoxwell Enforcement es un especialista en seguridad certificado, autorizado en toda la UEE. Siempre buscamos nuevos operadores. Si estas interesado, contacta a nuestros representantes.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Sunstone"\n- Brazos Antium Jet\n- Torso Antium Jet\n- Piernas Antium Jet\n- Casco Antium Jet\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_ShipAmbush_M_desc_001=Foxwell ha estado rastreando un <EM4>~mission(AmbushTarget)</EM4> usado por forajidos y descubrio un patron en sus movimientos. La nave pasara por <EM4>~mission(Location|Address)</EM4> pronto.\n\nBuscamos un contratista que vaya rapidamente, se esconda en la nube de emision y active la trampa en el momento adecuado. Suele haber naves de escolta. Ten cuidado de no delatarte antes de tiempo. El factor sorpresa es crucial.\n\nSi lo logras, el contratista principal recibira <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, A Tu Manera'\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Sunstone"\n- Brazos Antium Jet\n- Torso Antium Jet\n- Piernas Antium Jet\n- Casco Antium Jet\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_ShipAmbush_H_desc_001=Recientemente, un <EM4>~mission(AmbushTarget)</EM4> engaño a fuerzas de Foxwell con una baliza de rescate falsa. Cuando nos dimos cuenta, un escuadron ataco y solo sobrevivio un contratista. Sus registros identificaron la nave señuelo, y la hemos estado monitoreando.\n\nNuestra vigilancia revelo un patron de vuelo que podemos explotar. Hay una gran nube de emision en <EM4>~mission(Location|Address)</EM4> ideal para emboscarlos. ¿Crees poder manejarlo?\n\nSeras tu contra el <EM4>~mission(AmbushTarget)</EM4>, otras naves grandes y un gran escolta. Este grupo cambia naves frecuentemente, asi que seria inteligente traer apoyo.\n\nAl completar el trabajo, el contratista principal recibira <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, A Tu Manera'\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Sunstone"\n- Brazos Antium Jet\n- Torso Antium Jet\n- Piernas Antium Jet\n- Casco Antium Jet\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_ShipAmbush_VH_desc_001=Foxwell recibio informacion sobre forajidos que han formado un escuadron con naves sub-capitales y cazas. Nuestro cliente teme que desestabilicen la seguridad del sistema. Nos contrataron para eliminarlos.\n\nNecesitamos un contratista habil. La buena noticia es que tenemos un plan. Una nave del escuadron, un <EM4>~mission(AmbushTarget)</EM4>, fue robada a nuestro cliente, quien aun puede rastrearla. Pasan frecuentemente por <EM4>~mission(Location|Address)</EM4>, donde hay una gran nube de emision ideal para emboscarlos.\n\nNo mentire: no sera facil. No tenemos fuerzas adicionales, asi que trae tu propio apoyo.\n\nSi lo logras, he organizado <EM4>~mission(ScripAmount) MG Scrip</EM4> para el contratista principal.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, A Tu Manera'\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Sunstone"\n- Brazos Antium Jet\n- Torso Antium Jet\n- Piernas Antium Jet\n- Casco Antium Jet\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_ShipAmbush_S_desc_001=Hemos recibido reportes de ataques por una <EM4>~mission(AmbushTarget)</EM4> y sus escoltas. Al rastrear sus movimientos, notamos que frecuenta una nube de emision cerca de <EM4>~mission(Location|Address)</EM4>. Queremos usarla para una emboscada.\n\nUna vez alli, escondete en la nube para camuflar tu firma y atacar primero. Lamentablemente, Foxwell no puede enviar refuerzos, asi que deberas traer tu propio apoyo. La tripulacion del ~mission(AmbushTarget) es agresiva y experimentada.\n\nSi lo resuelves, el contratista principal recibira <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, A Tu Manera'\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Sunstone"\n- Brazos Antium Jet\n- Torso Antium Jet\n- Piernas Antium Jet\n- Casco Antium Jet\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_DefendLocation_VE_Desc_001=Naves forajidas acosan a cualquiera que intente aterrizar o despegar de las operaciones de nuestro cliente en <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Necesitamos que alguien vuele hasta alli para defender el lugar y proteger las naves de nuestro cliente antes de que la situacion se salga de control. Llega, persigue a esos agresores y te mantendre informado sobre lo que vaya ocurriendo.\n\nAyudanos a encargarnos de esto y haremos llegar un pago extra de <EM4>~mission(ScripAmount) MG Scrip</EM4> al contratista principal.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad a tu Medida'\n\nFoxwell Enforcement es un especialista en seguridad con licencia y fianza autorizado para operar por toda la UEE. Siempre estamos buscando nuevos operadores para que se unan a nuestra familia. Si tu o alguien que conoces esta interesado, ponte en contacto con uno de nuestros representantes de contratacion.\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Shock Trooper"\n- Brazos Antium Tormenta\n- Torso Antium Tormenta\n- Piernas Antium Tormenta\n- Casco Antium Tormenta\n- Bateria de rifle Parallax (80 balas)\n
Foxwell_DefendLocation_E_Desc_001=Las naves que entran y salen de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> estan siendo atacadas por fuerzas hostiles. La gente de alli nos ha contratado para resolver este problema de inmediato.\n\nNecesitamos alguien que llegue rapido y empiece a repeler a esas naves. La situacion parece estar cambiando constantemente, asi que te mantendre informado sobre donde se te necesita mas.\n\nPor tu esfuerzo, el contratista principal recibira ademas un bono de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad a tu Medida'\n\nFoxwell Enforcement es un especialista en seguridad con licencia y fianza autorizado para operar por toda la UEE. Siempre estamos buscando nuevos operadores para que se unan a nuestra familia. Si tu o alguien que conoces esta interesado, ponte en contacto con uno de nuestros representantes de contratacion.\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Shock Trooper"\n- Brazos Antium Tormenta\n- Torso Antium Tormenta\n- Piernas Antium Tormenta\n- Casco Antium Tormenta\n- Bateria de rifle Parallax (80 balas)\n
Foxwell_DefendLocation_M_Desc_001=Tenemos clientes informando de ataques de forajidos contra naves alrededor de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Han quedado totalmente bloqueados y cualquiera que entre o salga es un objetivo. Cada intento de resolver el problema solo ha provocado la aparicion de mas refuerzos forajidos.\n\nEl cliente necesita desesperadamente una solucion, asi que estamos contratando a alguien para que vaya y restaure la paz en la zona. Si surge cualquier otro problema una vez que estes alli, te comunicare instrucciones sobre como ayudar.\n\nNecesitamos a alguien en esto cuanto antes. Para hacerlo mas atractivo, el contratista principal tambien recibira un bono de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad a tu Medida'\n\nFoxwell Enforcement es un especialista en seguridad con licencia y fianza autorizado para operar por toda la UEE. Siempre estamos buscando nuevos operadores para que se unan a nuestra familia. Si tu o alguien que conoces esta interesado, ponte en contacto con uno de nuestros representantes de contratacion.\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Shock Trooper"\n- Brazos Antium Tormenta\n- Torso Antium Tormenta\n- Piernas Antium Tormenta\n- Casco Antium Tormenta\n- Bateria de rifle Parallax (80 balas)\n
Foxwell_DefendLocation_H_Desc_001=La gente de <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> esta bajo ataque y necesita nuestro apoyo. Sus naves en el area estan siendo objetivo y existe una creciente preocupacion de que esto sea solo el precursor de algo mayor.\n\nLa situacion esta evolucionando, pero estoy recibiendo actualizaciones constantes sobre lo que ocurre y te mantendre informado a medida que avance el contrato.\n\n¿Estas disponible para acudir en su ayuda? Seria inteligente reclutar algunos amigos para ayudar. Estos son clientes importantes y no podemos permitirnos fallarles. El contratista principal recibira un bono de <EM4>~mission(ScripAmount) MG Scrip</EM4> si completas el trabajo.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad a tu Medida'\n\nFoxwell Enforcement es un especialista en seguridad con licencia y fianza autorizado para operar por toda la UEE. Siempre estamos buscando nuevos operadores para que se unan a nuestra familia. Si tu o alguien que conoces esta interesado, ponte en contacto con uno de nuestros representantes de contratacion.\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Shock Trooper"\n- Brazos Antium Tormenta\n- Torso Antium Tormenta\n- Piernas Antium Tormenta\n- Casco Antium Tormenta\n- Bateria de rifle Parallax (80 balas)\n
Foxwell_DefendLocation_VH_Desc_001=Se necesita apoyo de naves en <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> inmediatamente. Los intereses de nuestro cliente en la zona estan sufriendo un feroz ataque por parte de fuerzas forajidas. Buscamos a alguien que pueda coger su equipo, unas cuantas naves de apoyo de confianza y desplegarse antes de que sea demasiado tarde. Cuando llegues, te enviare cualquier actualizacion de situacion.\n\nNo lo estropees. Estos clientes estan pagando y esperan una proteccion de primer nivel. Si algo sale mal, podriamos perder este contrato. Por eso daremos al contratista principal un bono de <EM4>~mission(ScripAmount) MG Scrip</EM4> si todo sale sin contratiempos.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad a tu Medida'\n\nFoxwell Enforcement es un especialista en seguridad con licencia y fianza autorizado para operar por toda la UEE. Siempre estamos buscando nuevos operadores para que se unan a nuestra familia. Si tu o alguien que conoces esta interesado, ponte en contacto con uno de nuestros representantes de contratacion.\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Shock Trooper"\n- Brazos Antium Tormenta\n- Torso Antium Tormenta\n- Piernas Antium Tormenta\n- Casco Antium Tormenta\n- Bateria de rifle Parallax (80 balas)\n
Foxwell_DefendLocation_S_Desc_001=Buscamos un profesional consumado para encargarse de un trabajo de alto riesgo. Tenemos clientes VIP en <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> que se enfrentan a forajidos extremadamente agresivos y motivados que atacan las naves alrededor de su ubicacion. Los detalles exactos del ataque aun estan llegando, pero parece una operacion amplia y con varios frentes.\n\nSi estas disponible, te recomiendo encarecidamente que traigas naves de apoyo de combate adicionales, abundantes suministros y que vengas preparado al maximo. Si haces esto bien, recompensaremos al contratista principal con un bono de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad a tu Medida'\n\nFoxwell Enforcement es un especialista en seguridad con licencia y fianza autorizado para operar por toda la UEE. Siempre estamos buscando nuevos operadores para que se unan a nuestra familia. Si tu o alguien que conoces esta interesado, ponte en contacto con uno de nuestros representantes de contratacion.\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Shock Trooper"\n- Brazos Antium Tormenta\n- Torso Antium Tormenta\n- Piernas Antium Tormenta\n- Casco Antium Tormenta\n- Bateria de rifle Parallax (80 balas)\n
Foxwell_SecurityPatrol_VE_Desc_001=Patrulla rutinaria para un cliente habitual. Visita y escanea varios waypoints comenzando en el <EM4>marcador de ubicacion</EM4> en tu HUD.\n\nEl contratista principal recibira un bono de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Sanguine"\n- Brazos Antium Arena\n- Torso Antium Arena\n- Piernas Antium Arena\n- Casco Antium Arena\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_SecurityPatrol_E_Desc_001=Necesitamos alguien para realizar una patrulla de seguridad. Ve al <EM4>marcador de ubicacion</EM4> en tu HUD y escanea varios waypoints designados para asegurar que esten seguros.\n\nLos satelites en la region han estado fallando. No sabemos exactamente que pasa, pero mejor preparate por si hay problemas.\n\nAl completar este contrato, el contratista principal recibira un bono de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad a tu Medida'\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Sanguine"\n- Brazos Antium Arena\n- Torso Antium Arena\n- Piernas Antium Arena\n- Casco Antium Arena\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_SecurityPatrol_M_Desc_001=Un cliente esta preocupado por actividad sospechosa cerca de sus intereses. Contratanos para patrullar y escanear varias ubicaciones.\n\nDirigete al <EM4>marcador de ubicacion</EM4> en tu HUD para comenzar. El cliente ofrecio un bono de <EM4>~mission(ScripAmount) MG Scrip</EM4> al contratista principal.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Sanguine"\n- Brazos Antium Arena\n- Torso Antium Arena\n- Piernas Antium Arena\n- Casco Antium Arena\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_SecurityPatrol_H_Desc_001=Se han avistado naves sospechosas en rutas de transporte de nuestro cliente. Tememos que esten preparando una emboscada.\n\nComienza yendo al <EM4>marcador de ubicacion</EM4> en tu HUD y escanealo. Luego te enviaremos a otras areas. Recomendamos traer un <EM4>ala</EM4> y suministros suficientes.\n\nEl contratista principal recibira un bono de <EM4>~mission(ScripAmount) MG Scrip</EM4> al completar la mision.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Sanguine"\n- Brazos Antium Arena\n- Torso Antium Arena\n- Piernas Antium Arena\n- Casco Antium Arena\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_SecurityPatrol_VH_Desc_001=Un cliente necesita ayuda urgente. Forajidos atacan sus naves en ciertos sectores.\n\nComienza en el <EM4>marcador de ubicacion</EM4> en tu HUD. Recomendamos traer al menos <EM4>dos pilotos</EM4> de apoyo.\n\nEl contratista principal recibira un bono de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nMantente alerta,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Sanguine"\n- Brazos Antium Arena\n- Torso Antium Arena\n- Piernas Antium Arena\n- Casco Antium Arena\n- Bateria de Fusil Parallax (80 balas)\n
Foxwell_SecurityPatrol_S_Desc_001=Necesitamos un piloto experimentado para una patrulla importante. Un cliente sufre constantes ataques de forajidos.\n\nLa patrulla comienza en el <EM4>marcador de ubicacion</EM4> en tu HUD. Segun informes, hay grupos de 5-7 naves hostiles, algunas grandes. Recomendamos traer al menos <EM3>tres amigos</EM3>.\n\nEl contratista principal recibira un bono de <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n\n\n\n<EM4>Planos potenciales</EM4>\n- Rifle de Asalto Energetico Parallax "Sanguine"\n- Brazos Antium Arena\n- Torso Antium Arena\n- Piernas Antium Arena\n- Casco Antium Arena\n- Bateria de Fusil Parallax (80 balas)\n
Highpoint_KillAnimals_rockcracker_desc_E_001=Si tienes algun trabajo que vaya a llevarte a una de esas antiguas estaciones QV Breaker del Cinturon Keeger, tenemos algo mas en lo que podrias ayudarnos mientras estes alli.\n \nRecientemente nos ha contactado la Alianza del Pueblo para colaborar en una iniciativa destinada a preparar estas estaciones abandonadas para sus reparaciones. Desgraciadamente, una infestacion de Valakkar esta causando graves problemas no solo para la infraestructura de las estaciones, sino tambien para las posibilidades de que algun dia vuelvan a ponerse en linea. Debido al estatus del Valakkar como especie invasora, hemos decidido que reducir su numero es la unica opcion viable.\n \nReduce la poblacion de Valakkar en cualquiera de las antiguas estaciones QV Breaker y te ofreceremos un pago.\n \nSaludos,\n \nWanda Werkheiser\n\nGerente de Contratos\n\nHighpoint Wilderness Specialists\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de escopeta R97 (10 balas)\n
RAIN_collectresources_single_OLP_desc_01=A todos los contratistas disponibles,\n\nNuestro equipo de investigacion en <EM4>~mission(Destination|Address)</EM4> trabaja incansablemente para resolver la actual "Crisis de Regeneracion" y abordar el problema de las impresiones inestables. Su trabajo ha producido resultados prometedores, pero la falta de un recurso clave esta impidiendo que puedan realizar mas experimentos.\n\nHemos recibido noticias de nuestro proveedor de que el aumento de la demanda combinado con menores rendimientos mineros significa que no recibiremos nuestro envio programado hasta dentro de varios meses. Nuestro equipo de investigacion no puede esperar tanto tiempo, y esperamos que puedas ayudar.\n\nEl recurso es dificil de conseguir, pero tenemos buenas razones para creer que las antiguas instalaciones mineras de Hathor fueron construidas en zonas con una alta concentracion de ese mineral. Como Hathor ceso operaciones poco despues de establecerse en el sistema, hay una buena probabilidad de que activar uno de esos laseres mineros pueda proporcionarte lo que necesitamos.\n\nJuntos podemos hacer del universo un lugar mejor para todos.\n\nNarina Lerrem\nGerente Senior\nExternalizacion de Investigacion Clinica\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Laser de Pulsos\n- Pistola Pulse "Blacklist"\n- Pistola Pulse "Rouge"\n- Subfusil de Energia Quartz\n- Subfusil Quartz "Deadfall"\n- Subfusil Quartz "Black Op"\n- Subfusil Quartz "Lumen"\n- Bateria de subfusil de energia Quartz (45 balas)\n- Bateria de pistola laser Pulse (60 balas)\n
RAIN_collectresources_multiple_OLP_desc_01=Para todos los contratistas disponibles,\n\nLos cientificos de Rayari estan trabajando arduamente para resolver los problemas de la tecnologia de regeneracion defectuosa. Actualmente, sus esfuerzos se ven obstaculizados por la falta de tres recursos esenciales para sus experimentos: <EM4>saldynium, jaclium y carinite</EM4>.\n\nEn particular, nuestros cientificos en <EM4>~mission(Destination|Address)</EM4> han tenido que suspender su trabajo despues de quedarse sin esos recursos. Como el reabastecimiento de nuestro proveedor habitual no sera posible durante meses debido a la escasez, pagaremos una prima a cualquiera que pueda ayudar a reponer los materiales.\n\nAunque no hemos podido realizar escaneos exhaustivos, nuestros equipos creen firmemente que las antiguas Plataformas Laser Orbitales de Hathor fueron construidas sobre zonas con una alta concentracion de estos recursos. Reactivar estas OLP podria ser tu mejor oportunidad para conseguir lo que necesitamos.\n\nJuntos podemos hacer del universo un lugar mejor para todos.\n\nNarina Lerrem\nGerente Senior\nExternalizacion de Investigacion Clinica\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Laser de Pulsos\n- Pistola Pulse "Blacklist"\n- Pistola Pulse "Rouge"\n- Subfusil de Energia Quartz\n- Subfusil Quartz "Deadfall"\n- Subfusil Quartz "Black Op"\n- Subfusil Quartz "Lumen"\n- Bateria de subfusil de energia Quartz (45 balas)\n- Bateria de pistola laser Pulse (60 balas)\n
Hockrow_FacilityDelve_P3M1_desc,P=Agencia Hockrow \nExpediente #JD10285\nInvestigador principal: Arken Mallor\n\nActualizacion del caso: \nToda tu investigacion en Onyx ha dado frutos. He podido confirmar que Jorrit ha estado operando un laboratorio no oficial en el Sitio-B de la instalacion para llevar a cabo un experimento al que llama "Proyecto Hyperion". Te enviare sus <EM4>notas de laboratorio a tu diario de mobiGlas</EM4> una vez que estes en camino, pero resumiendo: el bastardo esta intentando hacer evolucionar a los Humanos o alguna tonteria asi.\n\nEl cliente quiere los datos experimentales, asi que volveras a Onyx y haras todo lo necesario para poner en marcha el Proyecto Hyperion.\n\nAcciones del investigador del contrato:\nPrepara el experimento recogiendo un <EM4>codigo de reactivo del ala de Ingenieria</EM4> y un <EM4>codigo de catalizador del ala de Investigacion</EM4>.\n\nUna vez los tengas, baja al <EM4>Laboratorio del Sitio-B</EM4> y <EM4>ejecuta el experimento</EM4> para poder <EM4>subir los resultados</EM4>.\n\nNotas adicionales:\nComo este es un laboratorio activo, podria haber seguridad de ASD en el lugar.\n \nViaja a Onyx en un vehiculo que pueda almacenarse en un hangar grande.\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Laser Zenith "Onda Oscura"\n- LMG de Energia Fresnel "Fundido"\n- Brazos Armadura Geist Edicion ASD\n- Torso Armadura Geist Edicion ASD\n- Piernas Armadura Geist Edicion ASD\n- Casco Armadura Geist Edicion ASD\n- Bateria de fusil laser Zenith (22 balas)\n
