cfp_bombingrun_sabotage_generators_desc_001=Destruye tanques de combustible y generadores en ~mission(Location|Address).\n\nGracias,\n \nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- LMG FS-9\n- Escopeta BR-2\n- Fusil Gallant\n- Brazos ADP Bosque\n- Torso ADP\n- Piernas ADP Bosque\n- Casco Balor HCH\n- Brazos ADP-mk4 Bosque\n- Piernas ADP-mk4 Bosque\n- Torso ADP-mk4 Bosque\n- Casco ADP-mk4 Bosque\n- Cargador de LMG FS-9 (75 balas)\n- Cargador de Escopeta BR-2 (12 balas)\n- Bateria de Fusil Gallant (45 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Fusil de Francotirador P6-LR\n- Fusil de Francotirador A03\n- Casco CBH-3 Base\n- Brazos PAB-1\n- Torso PAB-1\n- Piernas PAB-1\n- Brazos TrueDef-Pro\n- Torso TrueDef-Pro Base\n- Casco Argus\n- Piernas TrueDef-Pro\n- Cargador de Fusil de Francotirador A03 (15 balas)\n- Cargador de Fusil de Francotirador P6-LR (8 balas)\n
cfp_sabotage_server_elimiatespecific_HH_desc_001=Apenas estamos juntando todas las piezas, pero hasta ahora hemos aprendido que un Headhunter llamado ~mission(TargetName) recientemente robo algunos datos sensibles que, de ser expuestos, serian perjudiciales para la causa de Citizens for Prosperity. \n\nNecesitamos asegurarnos de que se erradique cualquier rastro de los datos robados. Esto significa destruir todos los servidores de los Headhunters en ~mission(Location|Address), asi como rastrear a ~mission(TargetName|Last) para detener la diseminacion de la informacion.\n\nTu ayuda sera muy apreciada,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil de Francotirador P6-LR\n- Fusil de Francotirador A03\n- Casco CBH-3 Base\n- Brazos PAB-1\n- Torso PAB-1\n- Piernas PAB-1\n- Brazos TrueDef-Pro\n- Torso TrueDef-Pro Base\n- Casco Argus\n- Piernas TrueDef-Pro\n- Cargador de Fusil de Francotirador A03 (15 balas)\n- Cargador de Fusil de Francotirador P6-LR (8 balas)\n
cfp_delivery_eliminateall_sabotage_server_H_XT_desc_001=Los XenoThreat han atacado despiadadamente a nuestra gente y ahora necesitan desesperadamente apoyo de combate y suministros medicos.\n\nSi estas disponible, primero tendras que recoger los suministros en ~mission(Location|Address) antes de dirigirte a ~mission(Destination|Address). Una vez en el lugar, es importante que neutralices a todos los hostiles antes de completar la entrega de los suministros.\n\nAdemas, para ayudar a prevenir que esto vuelva a suceder, creemos que destruir los servidores de los XenoThreat en ~mission(Location2|Address) actuaria como un mayor disuasivo.\n\nGracias,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- LMG FS-9\n- Escopeta BR-2\n- Fusil Gallant\n- Brazos ADP Bosque\n- Torso ADP\n- Piernas ADP Bosque\n- Casco Balor HCH\n- Brazos ADP-mk4 Bosque\n- Piernas ADP-mk4 Bosque\n- Torso ADP-mk4 Bosque\n- Casco ADP-mk4 Bosque\n- Cargador de LMG FS-9 (75 balas)\n- Cargador de Escopeta BR-2 (12 balas)\n- Bateria de Fusil Gallant (45 balas)\n
LOC_UNINITIALIZED=<=UNINITIALIZED=>\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n- LMG FS-9\n- Escopeta BR-2\n- Fusil Gallant\n- Brazos ADP Bosque\n- Torso ADP\n- Piernas ADP Bosque\n- Casco Balor HCH\n- Brazos ADP-mk4 Bosque\n- Piernas ADP-mk4 Bosque\n- Torso ADP-mk4 Bosque\n- Casco ADP-mk4 Bosque\n- Cargador de LMG FS-9 (75 balas)\n- Cargador de Escopeta BR-2 (12 balas)\n- Bateria de Fusil Gallant (45 balas)\n
cfp_defend_cave_Generic_desc_001=Hemos recibido una llamada de auxilio desde ~mission(Location|Address) informando que estan siendo robados por un pequeño grupo de forajidos. ~mission(Location|CaveSize). Aunque remoto, este puesto avanzado es una pieza crucial de la infraestructura de CFP en la zona, por lo que necesitamos recuperarlo.\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna\n- Brazos Artimex\n- Torso Artimex\n- Piernas Artimex\n- Casco Artimex\n- Bateria de Fusil Karna (35 balas)\n
cfp_defend-criminals_desc_001=~mission(location|address) esta bajo amenaza de ataque por parte de forajidos y ha pedido ayuda. Necesitamos que alguien los proteja y ahuyente a los forajidos. \n\nAsegurate de permanecer cerca despues de su ataque inicial. Con demasiada frecuencia, los forajidos ganan peleas simplemente enviando mas cuerpos de los que cualquiera puede defender razonablemente, asi que asegurate de luchar contra los refuerzos antes de abandonar el area. \n\nLima Endicott\nDespachador principal\nCiudadanos por Pyro\n\n\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Bloom, PYR3 L1, PYR3 L2</EM4>\n- Fusil Karna "Fate"\n- Torso Artimex (Modificado)\n- Brazos Artimex (Modificado)\n- Bateria de Fusil Karna (35 balas)\n\n<EM4>Region outpost_regionab</EM4>\n- Fusil Karna\n- Brazos Artimex\n- Torso Artimex\n- Piernas Artimex\n- Casco Artimex\n- Bateria de Fusil Karna (35 balas)\n
cfp_defend_regionshift_desc_001=Hemos recibido una llamada de auxilio de uno de nuestros puestos avanzados cerca de ~mission(Location|Address). Un grupo de atacantes desconocidos ha lanzado un ataque. Se han reportado multiples muertes y necesitamos recuperar el puesto avanzado.\n\nSe que esto esta lejos de tu posicion actual, pero estamos desesperados por asegurar la zona y poner el puesto avanzado en funcionamiento nuevamente.\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Terminus, PYR6 L1, PYR6 L2</EM4>\n- Fusil Karna "Brimstone"\n- Torso Artimex Lodestone\n- Brazos Artimex Lodestone\n- Piernas Artimex Lodestone\n- Casco Artimex Lodestone\n- Bateria de Fusil Karna (35 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro I, PYR1 L1, PYR1 L2</EM4>\n- Fusil Karna\n- Brazos Artimex\n- Torso Artimex\n- Piernas Artimex\n- Casco Artimex\n- Bateria de Fusil Karna (35 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Fusil Karna\n- Torso Artimex Canuto\n- Brazos Artimex Canuto\n- Piernas Artimex Canuto\n- Casco Artimex Canuto\n- Bateria de Fusil Karna (35 balas)\n
cfp_eliminateall_hh_E_desc_001=Citizens for Prosperity busca personal de seguridad para recuperar un antiguo puesto avanzado de CFP que actualmente sirve como escondite para Headhunters que lanzan ataques por todo el sistema. \n\nUbicado cerca de ~mission(Location|Address), recuperar este puesto avanzado permitira a CFP brindar mayor apoyo a los esfuerzos locales para establecer estabilidad.\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Fusil Karna\n- Brazos Artimex\n- Torso Artimex\n- Piernas Artimex\n- Casco Artimex\n- Bateria de Fusil Karna (35 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Terminus, PYR6 L1, PYR6 L2</EM4>\n- Fusil Karna "Rager"\n- Torso Artimex Wildwood\n- Brazos Artimex Wildwood\n- Piernas Artimex Wildwood\n- Casco Artimex Wildwood\n- Bateria de Fusil Karna (35 balas)\n
cfp_eliminateall_XT_E_desc_001=A pesar de nuestros esfuerzos por promover la no violencia, los grupos de forajidos locales continuan atacando nuestra organizacion. XenoThreat asalto recientemente uno de nuestros puestos avanzados cerca de ~mission(Location|Address) y expulsaron a nuestros voluntarios que trabajaban alli.\n\nEstamos buscando personal de combate para recuperar el puesto avanzado. Idealmente, podriamos negociar algo para animarlos a que se retiren, pero XenoThreat recurre rapidamente a la violencia para resolver todos sus problemas, por lo que indudablemente habra una pelea.\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna\n- Torso Artimex Canuto\n- Brazos Artimex Canuto\n- Piernas Artimex Canuto\n- Casco Artimex Canuto\n- Bateria de Fusil Karna (35 balas)\n
cfp_eliminateall_fromCFP_hh_M_desc_001=Recibimos una comunicacion de emergencia desde uno de nuestros puestos avanzados cerca de ~mission(Location|Address) informando que estan siendo atacados por un grupo de Headhunters. Sabemos que nuestra presencia en el sistema ha molestado a los Headhunters, pero eso no excusa este ataque no provocado.\n\nSi estas disponible, reune tu equipo y dirigete alli. Solo ten en cuenta que los Headhunters son luchadores experimentados y no se rendiran facilmente.\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Pyro IV, Pyro V, Ignis</EM4>\n- Fusil Karna\n- Torso Artimex Canuto\n- Brazos Artimex Canuto\n- Piernas Artimex Canuto\n- Casco Artimex Canuto\n- Bateria de Fusil Karna (35 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Terminus, PYR6 L1, PYR6 L2</EM4>\n- Fusil Karna "Rager"\n- Torso Artimex Wildwood\n- Brazos Artimex Wildwood\n- Piernas Artimex Wildwood\n- Casco Artimex Wildwood\n- Bateria de Fusil Karna (35 balas)\n
cfp_eliminateall_fromCFP_Gen_E_desc_001=Citizens for Prosperity busca operadores de combate disponibles para ayudar a defender uno de nuestros puestos avanzados cerca de ~mission(Location|Address). Un grupo de forajidos ha lanzado un ataque no provocado y nuestro personal de seguridad necesita desesperadamente apoyo.\n\nDesplazate a ~mission(Location) con toda urgencia y buena suerte.\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna\n- Torso Artimex Canuto\n- Brazos Artimex Canuto\n- Piernas Artimex Canuto\n- Casco Artimex Canuto\n- Bateria de Fusil Karna (35 balas)\n
cfp_defend_headhunters_H_desc_001=Acaba de llegar una llamada de auxilio desde ~mission(Location|Address) afirmando que una gran fuerza de Headhunters ha atacado nuestro puesto avanzado alli. Ha habido multiples muertes y heridos entre los que lograron huir de la escena. Estamos buscando personal de seguridad disponible para dirigirse alli y recuperar el puesto avanzado.\n\nLos informes de testigos identificaron a los atacantes como ejecutores de elite de los Headhunters, asi que cuida de ti mismo y lleva ayuda si puedes. \n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna\n- Brazos Artimex\n- Torso Artimex\n- Piernas Artimex\n- Casco Artimex\n- Bateria de Fusil Karna (35 balas)\n
cfp_defend_headhunters_M_desc_001=Los Headhunters han lanzado un ataque no provocado contra uno de nuestros puestos avanzados en ~mission(Location|Address). Aunque no apoyamos el uso de la violencia, Citizens for Prosperity no permitira que personas inocentes mueran. Necesitamos personal de seguridad cualificado para recuperar el puesto avanzado.\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna\n- Brazos Artimex\n- Torso Artimex\n- Piernas Artimex\n- Casco Artimex\n- Bateria de Fusil Karna (35 balas)\n
cfp_defend-xenothreat_desc_003=¡Urgente!\n\nXenoThreat se esta movilizando para una incursion masiva para borrar ~mission(location|address) del mapa. Eres su unica esperanza de soportar este asalto y protegerlos de la crueldad de XenoThreat.\n\nSe que te estoy pidiendo que te pongas en la linea de fuego, pero Pyro no cambiara a menos que personas como tu sean lo suficientemente valientes para asumir estos peligros. Ninguna cantidad de creditos podria compararse con el bien que harias al intervenir.\n\nSi estas dispuesto y eres capaz de asumir esta mision, asegurate de llevar algunos aliados contigo. Sin duda, XenoThreat enviara refuerzos mas fuertes una vez que se den cuenta de que estan sufriendo perdidas.\n\nCreemos en ti.\n\nLima Endicott\nDespachador principal\nCiudadanos para Pyro\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna\n- Brazos Artimex\n- Torso Artimex\n- Piernas Artimex\n- Casco Artimex\n- Bateria de Fusil Karna (35 balas)\n
cfp_defend-xenothreat_desc_002=¡Urgente!\n\nXenoThreat tiene como objetivo ~mission(location|address) para enviar un mensaje a otros colonos sobre lo que sucede si aceptan nuestro apoyo. \n\nSi eres capaz de defenderte de ellos, estoy seguro de que enviaran fuerzas adicionales, por lo que tendras que prepararte para multiples ataques. Dado que XenoThreat tiene muchos recursos a su disposicion, deberias pensar en reclutar a otros para que te ayuden a mantener a todos a salvo.\n\nTodos contamos contigo.\n\nLima Endicott\nLider despachador\nCiudadanos de Pyro\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna\n- Brazos Artimex\n- Torso Artimex\n- Piernas Artimex\n- Casco Artimex\n- Bateria de Fusil Karna (35 balas)\n
cfp_ChainElimAll_1C_HHAttack_M_desc_001=Acabamos de recibir una comunicacion desesperada desde uno de nuestros puestos en ~mission(Location|Address) y buscamos especialistas en combate disponibles para repeler un ataque de los Headhunters. Todavia hay hostiles en el lugar y se reportan varias bajas, por lo que necesitamos que esto se resuelva rapidamente.\n\nProporcionare todos los datos relevantes tras la aceptacion. Gracias por tu ayuda.\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna "Fate"\n- Torso Artimex (Modificado)\n- Brazos Artimex (Modificado)\n- Bateria de Fusil Karna (35 balas)\n
cfp_defend-xenothreat_desc_001=Nos enteramos de que XenoThreat esta a punto de lanzar un ataque a ~mission(location|address). Si tienen exito, se espera que el numero de victimas sea elevado. Espero que con tu ayuda para defenderlos podamos asegurarnos de que eso no suceda.\n \nSabemos por encuentros pasados ​​que XenoThreat envia varios grupos de asalto para llevar a cabo sus ataques, asi que asegurate de no irte. el puesto de avanzada hasta que hayas rechazado todos los refuerzos. \n\nLima Endicott\nDespachador principal\nCiudadanos por Pyro\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna "Fate"\n- Torso Artimex (Modificado)\n- Brazos Artimex (Modificado)\n- Bateria de Fusil Karna (35 balas)\n
cfp_ChainElimAll_1C_ElimSpec_GenAttack_E_desc_001=Necesitamos personal de seguridad disponible para acudir a ~mission(Location|Address). Un grupo de individuos armados ha atacado uno de nuestros clusteres de puestos avanzados y necesitamos ayuda desesperadamente. Aunque el grupo parece no estar afiliado a ninguna banda conocida, hemos recibido informacion de que su lider es ~mission(TargetName), un forajido local con una reputacion feroz.\n\nPor favor, dirigete a ~mission(Location) lo antes posible y asegura la zona eliminando a los forajidos y a ~mission(Target|Last).\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna "Brimstone"\n- Torso Artimex Lodestone\n- Brazos Artimex Lodestone\n- Piernas Artimex Lodestone\n- Casco Artimex Lodestone\n- Bateria de Fusil Karna (35 balas)\n
cfp_ChainElimAll_2C_ElimSpec_GenAttack_M_desc_001=Varios de nuestros clusteres de puestos avanzados cerca de ~mission(Location|Address) han sido atacados por un grupo de forajidos liderados por ~mission(TargetName). Estamos buscando especialistas en combate disponibles para recuperar los puestos.\n\nPuedo proporcionar las ubicaciones tras la aceptacion, pero necesitamos despejar el puesto principal y las instalaciones satelitales de todas las fuerzas hostiles y eliminar a ~mission(Target|NameLast) ya que es poco probable que cesen sus hostilidades si escapan.\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna "Brimstone"\n- Torso Artimex Lodestone\n- Brazos Artimex Lodestone\n- Piernas Artimex Lodestone\n- Casco Artimex Lodestone\n- Bateria de Fusil Karna (35 balas)\n
cfp_ChainElimAll_3C_ElimSpec_GenAttack_M_desc_001=La presencia de forajidos aqui se ha vuelto mucho mas audaz ultimamente y mucha gente esta resultando herida. Recientemente hemos perdido varios clusteres de puestos avanzados alrededor de ~mission(Location|Address). Aunque no nos gusta recurrir a la violencia, la junta ha reconocido que estas ubicaciones son cruciales para establecer la estabilidad en el sistema y ha autorizado el uso de un equipo de seguridad para recuperarlas.\n\nTambien sabemos que los hostiles incrustados estan siendo liderados por ~mission(TargetName), quien tiene un historial de ataques a los intereses de CFP. La junta desea que se elimine a ~mission(TargetName|Last) para prevenir futuros ataques.\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna "Fate"\n- Torso Artimex (Modificado)\n- Brazos Artimex (Modificado)\n- Bateria de Fusil Karna (35 balas)\n
cfp_ChainElimAll_1C_ElimSpec_HHAttack_M_desc_001=Estamos buscando operativos de seguridad disponibles y cualificados para ayudar a recuperar un antiguo puesto avanzado de Citizens for Prosperity cerca de ~mission(Location|Address) que ha sido tomado por los Headhunters. \n\nEl grupo que actualmente ocupa el puesto esta liderado por ~mission(TargetName), un Headhunter conocido por su historial de agresion contra los locales y los voluntarios de CFP.\n\nNecesitamos asegurar a todos los Headhunters y eliminar a ~mission(TargetName|Last).\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna "Brimstone"\n- Torso Artimex Lodestone\n- Brazos Artimex Lodestone\n- Piernas Artimex Lodestone\n- Casco Artimex Lodestone\n- Bateria de Fusil Karna (35 balas)\n
cfp_ChainElimAll_2C_ElimSpec_HHAttack_H_desc_001=Citizens for Prosperity busca operativos de seguridad para recuperar varios puestos avanzados que anteriormente pertenecian a CFP cerca de ~mission(Location). Estos clusteres fueron tomados violentamente por ~mission(Target) y resultaron en la muerte de muchos voluntarios.\n\nRecuperar estos puestos nos ayudara a brindar mayor estabilidad al sistema. Los informes indican que ~mission(Target|Last) tiende a esconderse detras de sus subordinados, pero probablemente aparecera una vez que hayas despejado la mayoria de los hostiles.\n\nLos Headhunters estan bien entrenados y no cederan facilmente, preparate adecuadamente.\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna "Brimstone"\n- Torso Artimex Lodestone\n- Brazos Artimex Lodestone\n- Piernas Artimex Lodestone\n- Casco Artimex Lodestone\n- Bateria de Fusil Karna (35 balas)\n
cfp_ChainElimAll_3C_ElimSpec_HHAttack_VH_desc_001=La junta de Citizens for Prosperity acaba de autorizar fondos para contratar personal de seguridad con el fin de recuperar varios clusteres de antiguos puestos avanzados de CFP cerca de ~mission(Location|Address), que han caido en manos de los Headhunters. Aunque intentamos aceptar la perdida, se ha vuelto evidente que son cruciales para nuestras operaciones en curso en el sistema.\n\nDeberas despejar cada una de las ubicaciones que se te proporcionaran, pero mas importante, tendras que eliminar a ~mission(TargetName), quien esta a cargo de los hostiles en el sitio.\n\nEstos Headhunters estan fuertemente incrustados y tienen un historial de violencia, asi que preparate adecuadamente. \n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna "Fate"\n- Torso Artimex (Modificado)\n- Brazos Artimex (Modificado)\n- Bateria de Fusil Karna (35 balas)\n
cfp_ChainElimAll_2C_ElimSpec_XTAttack_H_desc_001=Buscamos personal de seguridad para reclamar varios clusteres previamente perdidos ante los agresores de XenoThreat. Estos puestos, ubicados cerca de ~mission(Location|Address), fueron tomados en un brutal ataque liderado por ~mission(TargetName), un teniente notorio de XenoThreat.\n\nQueremos recuperar estos clusteres para reanudar nuestras operaciones y continuar con nuestro buen trabajo. Deberas despejar a todos los hostiles en el lugar y a ~mission(TargetName|Last).\n\nRecuerda que XenoThreat esta altamente entrenado y dispuesto a luchar, preparate adecuadamente.\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna "Brimstone"\n- Torso Artimex Lodestone\n- Brazos Artimex Lodestone\n- Piernas Artimex Lodestone\n- Casco Artimex Lodestone\n- Bateria de Fusil Karna (35 balas)\n
cfp_ChainElimAll_3C_ElimSpec_XTAttack_VH_desc_001=A pesar de que Citizens for Prosperity esta comprometido con el cambio por medios no violentos, se ha hecho evidente que pueden necesitarse excepciones. Varios clusteres de puestos avanzados cerca de ~mission(Location|Address) fueron recientemente tomados de manera violenta por fuerzas de XenoThreat bajo el mando de ~mission(TargetName).\n\nEstamos buscando operativos de combate disponibles para ayudar a recuperar estos puestos. Esto sin duda sera una tarea dificil, ya que XenoThreat esta altamente entrenado y dispuesto a luchar, asi que preparate adecuadamente.\n\nAdemas de despejar cada cluster de fuerzas de XenoThreat, deberas eliminar a ~mission(TargetName|Last), cuya perdida sin duda hara el sistema mas seguro.\n\nBuena suerte\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna "Fate"\n- Torso Artimex (Modificado)\n- Brazos Artimex (Modificado)\n- Bateria de Fusil Karna (35 balas)\n
cfp_defend_boss_Generic_desc_001=Acabamos de recibir informes de un ataque masivo contra ~mission(Location) por un gran grupo de individuos armados liderados por ~mission(TargetName), un notorio forajido que ha estado amenazando al personal de Citizens for Prosperity durante meses. Los detalles aun estan por confirmarse, pero sabemos que ha habido multiples bajas.\n\nCitizens for Prosperity esta buscando personal de seguridad cualificado para ir y recuperar los puestos avanzados de estos elementos hostiles. Nuestra comprension es que ~mission(TargetName|Last) tiende a esconderse detras de sus soldados, pero emergera si eliminas a suficientes de sus subordinados.\n\nAunque no nos gusta recurrir a la violencia, la direccion no ve otra forma de resolver esta situacion y continuar con nuestro buen trabajo en el sistema.\n\nBuena suerte,\n\nLima Endicott\nJefe de expedicion\nCitizens for Prosperity\n\n\n\n<EM4>Planos potenciales</EM4>\n- Fusil Karna\n- Torso Artimex Canuto\n- Brazos Artimex Canuto\n- Piernas Artimex Canuto\n- Casco Artimex Canuto\n- Bateria de Fusil Karna (35 balas)\n
CFP_RecoverCargo_Easy_Description=La vida es dura en la frontera, y cada entrega a nuestros colonos es importante. Realmente no podemos permitirnos perder mas este año.\n\nUno de nuestros proveedores clave ha sido atacado por un grupo de forajidos en <EM4>~mission(Location|Address)</EM4> y ha dejado de comunicarse. Temo lo peor, pero si aun podemos recuperar los suministros que estaban transportando, podria marcar una gran diferencia.\n\nEs probable que los forajidos que los atacaron sigan merodeando por alli, asi que mantente alerta. Una vez que te hayas ocupado de ellos, toma la carga y llevala al elevador de carga en <EM4>~mission(Destination|Address)</EM4>. Asegurate de volar una nave que pueda transportar <EM4>contenedores de carga de ~mission(MissionMaxSCUSize)</EM4> y trae tambien un <EM4>tractor de mano de alta capacidad</EM4>.\n\nVuela seguro,\n\nLima Endicott\nDespachadora Principal\nCiudadanos por la Prosperidad\n\n\n\n<EM4>Planos potenciales</EM4>\n- Subfusil P8-SC\n- Subfusil C54\n- Fusil S71\n- Brazos ORC-mkX Bosque\n- Piernas ORC-mkX Bosque\n- Torso ORC-mkX Bosque\n- Casco ORC-mkX Bosque\n- Brazos ORC-mkV\n- Piernas ORC-mkV\n- Torso ORC-mkV\n- Casco G-2 Bosque\n- Cargador de Subfusil P8-SC (45 balas)\n- Cargador de Subfusil C54 (50 balas)\n- Cargador de Fusil S71 (30 balas)\n
CFP_RecoverCargo_Medium_Description=Una nave de Ciudadanos por la Prosperidad ha sido emboscada por un grupo de forajidos en <EM4>~mission(Location|Address)</EM4> y necesitamos un piloto habilidoso que les ayude.\n\nPerdimos contacto con ellos en medio de la comunicacion, pero parecia que estaban recibiendo fuego intenso. Puede que sea demasiado tarde para ellos, pero los suministros vitales que llevaban aun podrian ser de buena utilidad. Vuela hacia alla, elimina cualquier hostil y recupera el cargamento. Necesitaras una nave que pueda soportar <EM4>contenedores de carga de ~mission(MissionMaxSCUSize)</EM4> y un <EM4>tractor de mano de alta capacidad</EM4> para transportar los suministros a tu nave.\n\nLleva los suministros al elevador de carga en <EM4>~mission(Destination|Address)</EM4> y garantizare que se les dara un buen uso.\n\nTen cuidado,\n\nLima Endicott\nDespachadora Principal\nCiudadanos por la Prosperidad\n\n\n\n<EM4>Planos potenciales</EM4>\n- Subfusil P8-SC\n- Subfusil C54\n- Fusil S71\n- Brazos ORC-mkX Bosque\n- Piernas ORC-mkX Bosque\n- Torso ORC-mkX Bosque\n- Casco ORC-mkX Bosque\n- Brazos ORC-mkV\n- Piernas ORC-mkV\n- Torso ORC-mkV\n- Casco G-2 Bosque\n- Cargador de Subfusil P8-SC (45 balas)\n- Cargador de Subfusil C54 (50 balas)\n- Cargador de Fusil S71 (30 balas)\n
CFP_RecoverCargo_Hard_Description=Estabamos en proceso de entregar un envio urgente a la gente en <EM4>~mission(Destination|Address)</EM4> cuando nuestro piloto se topo con un grupo de forajidos. Intentaron huir, pero ya era demasiado tarde.\n\nAunque hay un lado positivo. Los localizadores muestran que la carga aun esta intacta, ubicada en <EM4>~mission(Location|Address)</EM4>. Hay una buena probabilidad de que los forajidos la esten custodiando mientras localizan una nave lo suficientemente grande para transportarlo todo. Aunque no quiero arriesgarme a perder otro piloto, la necesidad de la carga a bordo es lo suficientemente desesperada como para justificar la decision de enviar a alguien a recuperarla.\n\nEsto no sera facil, estos forajidos no mostraron piedad a nuestro piloto. Necesitaras eliminarlos primero antes de recuperar la carga. Trae una nave que pueda almacenar <EM4>contenedores de carga de ~mission(MissionMaxSCUSize)</EM4> y un <EM4>tractor de mano de alta capacidad</EM4> para el traslado. Entregala en el elevador de carga en <EM4>~mission(Destination)</EM4> y arreglemos esto.\n\nVuela seguro,\n\nLima Endicott\nDespachadora Principal\nCiudadanos por la Prosperidad\n\n\n\n<EM4>Planos potenciales</EM4>\n- Subfusil P8-SC\n- Subfusil C54\n- Fusil S71\n- Brazos ORC-mkX Bosque\n- Piernas ORC-mkX Bosque\n- Torso ORC-mkX Bosque\n- Casco ORC-mkX Bosque\n- Brazos ORC-mkV\n- Piernas ORC-mkV\n- Torso ORC-mkV\n- Casco G-2 Bosque\n- Cargador de Subfusil P8-SC (45 balas)\n- Cargador de Subfusil C54 (50 balas)\n- Cargador de Fusil S71 (30 balas)\n
CFP_RecoverCargo_VeryHard_Description=Cada vez mas naves de CFP estan siendo atacadas ultimamente, y a pesar de nuestros mejores esfuerzos por mantener nuestras rutas comerciales discretas, seguimos perdiendo transportistas por ataques de forajidos.\n\nNuestro piloto en <EM4>~mission(Location|Address)</EM4> es la ultima victima. Me duele pensar en cuanto hemos perdido, pero mientras haya gente que necesite nuestra ayuda, tenemos que seguir luchando.\n\nSi tienes una nave que pueda transportar <EM4>contenedores de carga de ~mission(MissionMaxSCUSize)</EM4> y un <EM4>tractor de mano de alta capacidad</EM4>, necesitamos que te dirijas a la ubicacion mencionada y recuperes esa carga.\n\nEsto no sera facil, el piloto era uno de los nuestros mejores y no caeria sin luchar. No subestimemos a estos forajidos, trae una tripulacion de confianza y cuidaos las espaldas mutuamente.\n\nUna vez que tengas la carga, entregala en el elevador de carga en <EM4>~mission(Destination|Address)</EM4> y me encargare de procesarla.\n\nBuena suerte y cuidate,\n\nLima Endicott\nDespachadora Principal\nCiudadanos por la Prosperidad\n\n\n\n<EM4>Planos potenciales</EM4>\n- Subfusil P8-SC\n- Subfusil C54\n- Fusil S71\n- Brazos ORC-mkX Bosque\n- Piernas ORC-mkX Bosque\n- Torso ORC-mkX Bosque\n- Casco ORC-mkX Bosque\n- Brazos ORC-mkV\n- Piernas ORC-mkV\n- Torso ORC-mkV\n- Casco G-2 Bosque\n- Cargador de Subfusil P8-SC (45 balas)\n- Cargador de Subfusil C54 (50 balas)\n- Cargador de Fusil S71 (30 balas)\n
CFP_RecoverCargo_Super_Description=Normalmente no pediria a alguien que hiciera algo tan arriesgado, pero estas son circunstancias excepcionales.\n\nNuestro piloto estaba transportando carga vital cuando fue atacado por un grupo de forajidos. Bajo ninguna circunstancia podemos permitir que se apoderen de la carga.\n\nCon el tamaño de la fuerza hostil que ataco, no podras hacer esto solo, necesitaras llevar una tripulacion habilidosa contigo a <EM4>~mission(Location|Address)</EM4> para eliminar a estos forajidos y recuperar la carga. Asegurate de que al menos uno de vosotros tenga una nave que pueda almacenar <EM4>contenedores de carga de ~mission(MissionMaxSCUSize)</EM4> y un <EM4>tractor de mano de alta capacidad</EM4>.\n\nSi por algun milagro puedes recuperar esa carga, llevala al elevador de carga ubicado en <EM4>~mission(Destination|Address)</EM4>.\n\nEs mucho pedir, pero si puedes lograrlo, tendras mi agradecimiento y el de toda la organizacion.\n\nBuena suerte,\n\nLima Endicott\nDespachadora Principal\nCiudadanos por la Prosperidad\n\n\n\n<EM4>Planos potenciales</EM4>\n- Subfusil P8-SC\n- Subfusil C54\n- Fusil S71\n- Brazos ORC-mkX Bosque\n- Piernas ORC-mkX Bosque\n- Torso ORC-mkX Bosque\n- Casco ORC-mkX Bosque\n- Brazos ORC-mkV\n- Piernas ORC-mkV\n- Torso ORC-mkV\n- Casco G-2 Bosque\n- Cargador de Subfusil P8-SC (45 balas)\n- Cargador de Subfusil C54 (50 balas)\n- Cargador de Fusil S71 (30 balas)\n
eckhart_defendship_VLRT_desc_001=ECKHART SECURITY, LLC.\nCONTRATOS Y ENVIOS\n\nTIPO DE CONTRATO: Defender Nave\nCODIGO DE APROBACION = ~mission(ApprovalCode)\n\nPARA PROCESAMIENTO INMEDIATO\n\nUn cliente reporta problemas cerca de <EM4>~mission(Location|Address)</EM4>. Segun sus comunicaciones, no parece un ataque organizado y profesional. Aun asi, nos pagan por proporcionar proteccion y se ha solicitado.\n\nNecesito un contratista que vuele alli y asegure la situacion.\n\nEl pago se emitira tras la finalizacion exitosa del contrato.\n\nEste contrato no es negociable.\n\nEste mensaje puede contener informacion confidencial, propietaria, privilegiada y/o privada. La informacion esta destinada al uso del individuo o entidad designado arriba.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
eckhart_defendship_LRT_desc_001=ECKHART SECURITY, LLC.\nCONTRATOS Y ENVIOS\n\nTIPO DE CONTRATO: Defender Nave\nCODIGO DE APROBACION = ~mission(ApprovalCode)\n\nPARA PROCESAMIENTO INMEDIATO\n\nUno de nuestros clientes tuvo la brillante idea de probar sus habilidades de combate aereo en un escenario real. No parece que este yendo bien, porque nos contacto pidiendo apoyo.\n\nDirigete a <EM4>~mission(Location|Address)</EM4> y ayuda a limpiar el lio que crearon.\n\nEl pago se emitira tras la finalizacion exitosa del contrato.\n\nEste contrato no es negociable.\n\nEste mensaje puede contener informacion confidencial, propietaria, privilegiada y/o privada. La informacion esta destinada al uso del individuo o entidad designado arriba.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
eckhart_defendship_MRT_desc_001=ECKHART SECURITY, LLC.\nCONTRATOS Y ENVIOS\n\nTIPO DE CONTRATO: Defender Nave\nCODIGO DE APROBACION = ~mission(ApprovalCode)\n\nPARA PROCESAMIENTO INMEDIATO\n\nUn cliente de alto perfil decidio recorrer el sistema Nyx pero fue atacado por naves hostiles alrededor de <EM4>~mission(Location|Address)</EM4>.\n\nParece que estan abrumados. ¿Hay alguna posibilidad de que puedas dirigirte a su ubicacion y proporcionar apoyo?\n\nEl pago se emitira tras la finalizacion exitosa del contrato.\n\nEste contrato no es negociable.\n\nEste mensaje puede contener informacion confidencial, propietaria, privilegiada y/o privada. La informacion esta destinada al uso del individuo o entidad designado arriba.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
eckhart_defendship_multi_HRT_desc_001=ECKHART SECURITY, LLC.\nCONTRATOS Y ENVIOS\n\nTIPO DE CONTRATO: Defender Nave\nCODIGO DE APROBACION = ~mission(ApprovalCode)\n\nPARA PROCESAMIENTO INMEDIATO\n\nRecientemente, recomendamos a un cliente que use una ruta especifica para cruzar Nyx de forma segura. Resulta que no era tan segura como asumimos, porque un grupo embosco la nave de nuestro cliente. Necesitamos limpiar esto lo antes posible. ¿Estas disponible para ayudar?\n\nLa inteligencia del cliente indica un ataque bien organizado, asi que sera mejor que estes equipado para lidiar con hostiles experimentados en este. Apresurate a <EM4>~mission(Location|Address)</EM4>, ayudalos a sobrevivir esto y te pagaremos bien por tus problemas.\n\nEl pago se emitira tras la finalizacion exitosa del contrato.\n\nEste contrato no es negociable.\n\nEste mensaje puede contener informacion confidencial, propietaria, privilegiada y/o privada. La informacion esta destinada al uso del individuo o entidad designado arriba.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
eckhart_defendship_multi_VHRT_desc_001=ECKHART SECURITY, LLC.\nCONTRATOS Y ENVIOS\n\nTIPO DE CONTRATO: Defender Nave\nCODIGO DE APROBACION = ~mission(ApprovalCode)\n\nPARA PROCESAMIENTO INMEDIATO\n\nA pesar de nuestras advertencias, un cliente decidio volar a <EM4>~mission(Location|Address)</EM4>. Como era de esperar, acaban de activar una baliza de rescate en el area, asi que buscamos un contratista para llegar al sitio, evaluar la situacion y, con suerte, rescatar al cliente.\n\nLes advertimos que forajidos extremadamente peligrosos y bien equipados a menudo atacan naves alli. Eso es exactamente lo que supongo que paso aqui, asi que asegurate de planificar en consecuencia.\n\nEl pago se emitira tras la finalizacion exitosa del contrato.\n\nEste contrato no es negociable.\n\nEste mensaje puede contener informacion confidencial, propietaria, privilegiada y/o privada. La informacion esta destinada al uso del individuo o entidad designado arriba.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
eckhart_defendship_multi_SRT_desc_001=ECKHART SECURITY, LLC.\nCONTRATOS Y ENVIOS\n\nTIPO DE CONTRATO: Defender Nave\nCODIGO DE APROBACION = ~mission(ApprovalCode)\n\nPARA PROCESAMIENTO INMEDIATO\n\nTenemos un cliente actualmente bajo ataque en <EM4>~mission(Location|Address)</EM4>. Tenemos una larga historia con este cliente y sabemos que es un habil piloto de combate. Si estan luchando por sobrevivir, entonces esta situacion debe ser grave.\n\nBuscamos un piloto de combate de primer nivel que se dirija alli y proporcione apoyo. Si estas disponible, entonces este cliente realmente podria usar tu ayuda.\n\nEl pago se emitira tras la finalizacion exitosa del contrato.\n\nEste contrato no es negociable.\n\nEste mensaje puede contener informacion confidencial, propietaria, privilegiada y/o privada. La informacion esta destinada al uso del individuo o entidad designado arriba.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97\n- Brazos Monde\n- Torso Monde\n- Piernas Monde\n- Casco Monde\n- Brazos Monde Hiro\n- Torso Monde Hiro\n- Piernas Monde Hiro\n- Casco Monde Hiro\n- Cargador de Escopeta R97 (18 balas)\n
Foxwell_bombingrun_VE_desc_001=Un grupo de forajidos ha estado acosando a nuestro cliente y recientemente las cosas han empeorado. Se han apoderado de su propiedad y hemos agotado todas las demas opciones.\n\nNecesitamos un piloto decente que vaya a <EM4>~mission(Location|Address)</EM4> y destruya sus tanques de combustible. Si puedes cortar sus suministros, puedes allanar el camino para que el cliente recupere su propiedad.\n\nEsta no deberia ser dificil. Podrias encontrarte con una o dos naves y tal vez algunas torretas, pero has sido autorizado para usar fuerza letal. Todo lo que necesitamos que hagas es entrar, destruir los tanques de combustible y salir.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad afianzado con licencia para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, comuniquense con uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_bombingrun_E_desc_001=Acabamos de recibir la ubicacion de un puesto avanzado forajido donde algunos criminales en ascenso han estado reunidos. Ahora, nuestro cliente dice que no hay razon para enfrentarse a estos tipos directamente. En su lugar, atacaras sus lineas de suministro.\n\nVuela a <EM4>~mission(Location|Address)</EM4> y destruye sus reservas de combustible mientras te enfrentas a cualquier resistencia minima que puedan ofrecer. Dependera de ti cuanto te enfrentes a las fuerzas hostiles, solo no olvides que tu objetivo principal es asegurarte de que esos tanques de combustible queden fuera de servicio.\n\nEste es un contrato de nivel amarillo, asi que el pago sera proporcional.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad afianzado con licencia para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, comuniquense con uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_bombingrun_M_desc_001=Necesitamos un contratista astuto para una operacion de golpe y fuga. El cliente dice que algunos matones locales se han estado congregando en numeros preocupantes y se nos ha encargado interrumpir su base de operaciones.\n\nDirigete a <EM4>~mission(Location|Address)</EM4> y destruye sus tanques de combustible. Si tienes exito, podemos retrasar los planes de estos tipos por un tiempo, y lo mas importante, sin tener que enfrentarlos directamente.\n\nLos informes muestran que hay un par de naves volando por el area y algunas torretas de defensa. Solo concentrate en los tanques de combustible y deberias estar bien.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad afianzado con licencia para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, comuniquense con uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_bombingrun_H_desc_001=Se ha presentado una oportunidad para que un cliente tome medidas contra un grupo de criminales que han estado acosando su negocio.\n\nSegun los informes, este grupo de forajidos actualmente esta escondido en <EM4>~mission(Location|Address)</EM4>. El cliente cree que es un buen momento para tomarlos por sorpresa y llevarlos ante la justicia. El trabajo es destruir sus tanques de combustible y poner fin a sus operaciones de contrabando de una vez por todas.\n\nEstos tipos no deben ser subestimados. Mejor trae algo de refuerzo y vuela bajo para evitar las torretas. La prioridad, como siempre, son los tanques de combustible.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad afianzado con licencia para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, comuniquense con uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_bombingrun_VH_desc_001=Foxwell ha sido contratado por un cliente para participar en una operacion de multiples etapas en una base forajida conocida en <EM4>~mission(Location|Address)</EM4> y necesita un piloto fuerte para desempenar su papel en esto.\n\nTu, y las naves de apoyo adicionales que organices, tendran la tarea de destruir los tanques de combustible ubicados alli para preparar el escenario para el resto de la operacion.\n\nDesafortunadamente, este lugar esta infestado de naves y torretas antiaereas. Asi que asegurate de que tu y tu gente esten listos, y recuerda, los tanques de combustible son tu prioridad. No es necesario ser un heroe.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad afianzado con licencia para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, comuniquense con uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_bombingrun_S_desc_001=Estamos buscando un equipo mercenario altamente competente para ayudar con una demolicion desafiante para un cliente VIP.\n\nLos forajidos que operan en <EM4>~mission(Location|Address)</EM4> han sido identificados como una amenaza de creciente preocupacion en el area y para ayudar a manejar esta situacion, a tu equipo se le asigna la tarea de destruir los tanques de combustible en la ubicacion.\n\nSin embargo, no sera tan facil como simplemente entrar y salir sin problemas: espera enfrentarte a multiples hostiles y torretas que te estaran esperando. Cuanto mas fuerte sea tu tripulacion, mejores seran tus posibilidades de completar esta operacion con exito.\n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad afianzado con licencia para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, comuniquense con uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
foxwell_DefendShip_E_desc_001=Foxwell busca un piloto de combate disponible para brindar asistencia inmediata a un ~mission(Ship) bajo ataque cerca de ~mission(Location|Address). No hemos identificado a los perpetradores del ataque, pero nos han asegurado que es una fuerza pequeña.\n\nPor favor, despachate rapidamente y elimina a todos los hostiles. Necesitamos que el cliente sobreviva, ya que aun no nos ha pagado.\n\nBuena suerte,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, comunicate con uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
foxwell_DefendShip_M_desc_001=Tenemos un contrato de nivel naranja para cualquier piloto de combate disponible. Un ~mission(Ship) esta bajo ataque cerca de ~mission(Location|Address) y necesita desesperadamente ayuda. No estamos seguros de cuantos perpetradores hay, pero parecen estar motivados y ser peligrosos, asi que actua con cautela.\n\nUna vez en el lugar, enfrenta y elimina a cualquier hostil que encuentres y protege al cliente. Una vez que hayan transferido los creditos, procesaremos tu pago.\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, comunicate con uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
foxwell_DefendShip_H_desc_001=Acaba de llegar un contrato de emergencia sobre una pelea cerca de ~mission(Location|Address). Al parecer, un grupo de naves fue emboscado por forajidos liderados por ~mission(TargetName), buscado en varios planetas por asesinato y robo de naves. Foxwell busca pilotos de combate de primera categoria para ir y proteger a los clientes de ellos.\n\nEste contrato ha sido marcado como de nivel rojo, por lo que es realmente peligroso. Si tienes gente que puedas traer, probablemente deberias hacerlo. Y si lo haces, tambien deberias informarles sobre las politicas de contratacion de Foxwell.\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, comunicate con uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_Mercenary_Rehire_desc_001=Debido a una reestructuracion corporativa, Foxwell tiene algunas vacantes nuevas que necesitan ser cubiertas de inmediato. Sabemos que anteriormente has mostrado interes en este tipo de trabajo y nos preguntamos si te gustaria intentarlo nuevamente con otro contrato.\n\nUno de nuestros clientes necesita apoyo en <EM4>~mission(Location|Address)</EM4>, donde sus fuerzas de seguridad estan teniendo problemas para contener una incursion de forajidos. Dirigete alli y ayuda a las fuerzas locales a eliminar la amenaza antes de que sea demasiado tarde. \n\nSi completas este contrato con exito, Foxwell estara encantado de enviarte mas oportunidades de trabajo.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es una empresa de seguridad con licencia para operar en todo el UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, contacta a uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_EliminateAll_Allies_desc_001=Nos ha llegado informacion de que un grupo de forajidos esta intentando tomar el control de <EM4>~mission(Location|Address)</EM4>. Hay fuerzas de seguridad locales en la zona, pero estan teniendo dificultades para contener el ataque.\n\nSe necesita un contratista que pueda llegar rapidamente y encargarse de los agresores. Lleva suficiente equipo y ten cuidado al enfrentarte a los objetivos. No queremos recibir informes de miembros de seguridad alcanzados por fuego cruzado.    \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es una empresa de seguridad con licencia para operar en todo el UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, contacta a uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_EliminateAll_NonHostiles_desc_001=Nos han contratado para encargarnos de una situacion delicada. Una banda se ha asentado en <EM4>~mission(Location|Address)</EM4> y necesitamos despejar el area. El problema es que todavia hay algunos civiles presentes. \n\nBuscamos a alguien con habilidades y buen criterio para eliminar a estos forajidos sin causar daños a personas inocentes. Si crees que puedes hacerlo, equipa tu equipo y dirigete alli. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es una empresa de seguridad con licencia para operar en todo el UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, contacta a uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_EliminateAll_desc_001=Buscamos a alguien dispuesto a sacar la basura en <EM4>~mission(Location|Address)</EM4>. Parece que una banda se ha instalado sin el permiso de los dueños, asi que nos han contratado para echarlos de la forma que consideremos adecuada. \n\nSi fuera tu, llevaria mucha municion. Dudo que quieran irse por su cuenta. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es una empresa de seguridad con licencia para operar en todo el UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, contacta a uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_EliminateSpecific_desc_001=Buscamos ejecutar una caceria sobre <EM4>~mission(TargetName)</EM4>. Hemos descubierto que actualmente se esconde junto a algunos aliados en <EM4>~mission(Location|Address)</EM4>. \n\nEspera encontrar a unos cuantos matones rondando a <EM4>~mission(TargetName|Last)</EM4>, pero nuestro unico objetivo real es que elimines al blanco. \n    \n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es una empresa de seguridad con licencia para operar en todo el UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, contacta a uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_EliminateSpecific_NonHostiles_desc_001=Tenemos informacion sobre una recompensa por <EM4>~mission(TargetName)</EM4>. Alguien los vio junto a conocidos complices criminales en <EM4>~mission(Location|Address)</EM4>. Necesitamos que llegues alli antes de que desaparezcan. \n\n<EM4>~mission(TargetName|Last)</EM4> tiene la reputacion de solo aparecer en lugares con civiles. Es crucial que elimines a este objetivo sin causar daños colaterales. Foxwell no puede permitirse el escandalo que se desataria si hay bajas civiles. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es una empresa de seguridad con licencia para operar en todo el UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, contacta a uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_DestroyNarcotics_E_desc_001=Algunas personas haran cualquier cosa por unos cuantos creditos. Hay un grupo de forajidos novatos en <EM4>~mission(Location|Address)</EM4> que ha decidido empezar a fabricar drogas. Parece que no son muy buenos en ello, o quizas demasiado buenos. La porqueria que estan produciendo es mas potente de lo normal y representa un peligro real para quienes la consuman. \n\nNos han contratado para acabar con su operacion y destruir cualquier alijo de drogas en el sitio. Hay guardias armados protegiendo el lugar, pero no parecen muy habiles. Nuestros equipos de vigilancia vieron a uno de ellos casi dispararse en el pie. No podemos asegurarlo, pero lo mas probable es que no representen un problema para un profesional como tu.  \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es una empresa de seguridad con licencia para operar en todo el UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, contacta a uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_DestroyNarcotics_M_desc_001=Hemos sido contratados para encargarnos de un problema en <EM4>~mission(Location|Address)</EM4>. Recientemente, la actividad relacionada con el trafico de drogas en la zona ha aumentado considerablemente. Parece ser una operacion bien organizada y existe una creciente preocupacion de que se expanda si no se detiene a tiempo. ¿Estas disponible para asegurarte de que eso no ocurra?   \n\nEl trabajo es bastante sencillo. Dirigete al sitio y destruye su alijo de drogas. Sin ese dinero, no podran seguir expandiendo sus operaciones. Sin embargo, no esperes que te lo pongan facil. Se han visto guardias armados patrullando regularmente el lugar, asi que asegurate de estar bien equipado para enfrentarlos. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es una empresa de seguridad con licencia para operar en todo el UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, contacta a uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_DestroyNarcotics_H_desc_001=Se han reportado un aumento en las sobredosis de drogas en Stanton, lo que ha puesto en alerta a los servicios de seguridad. Parece que un grupo de poca monta esta aumentando sus ganancias adulterando su mercancia con quimicos toxicos. Desmantelar a esta banda y frenar la distribucion de sus drogas se ha convertido en una prioridad. \n\nUn informante de Foxwell ha revelado que parte de esta banda ha establecido su base en <EM4>~mission(Location|Address)</EM4>. Se busca un contratista que pueda llegar rapidamente y destruir cualquier alijo de drogas antes de que se distribuyan por el sistema. Pero ten cuidado, se dice que este grupo esta fuertemente armado y no tiene intencion de dejar que nadie interfiera con su negocio.  \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es una empresa de seguridad con licencia para operar en todo el UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, contacta a uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_EliminateAll_PAF_M_desc_001=Hemos estado rastreando a un grupo de forajidos que han estado causando problemas a uno de nuestros clientes. Parece que se han instalado en una antigua instalacion de Hathor. No sabemos que planean hacer con ese viejo complejo, pero nuestro cliente esta ansioso por que sean eliminados.\n\nBuscamos a alguien que vaya a <EM4>~mission(Location|Address)</EM4> y neutralice a estos objetivos.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es un especialista en seguridad con licencia para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, comunicate con uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
Foxwell_EliminateAll_OLP_M_desc_001=Hemos estado siguiendo a un grupo de forajidos en nombre de un cliente, y parece que han hecho una parada permanente en una vieja plataforma orbital.\n\nBuscamos un contratista que pueda dirigirse a <EM4>~mission(Location|Address)</EM4> y neutralizar a los objetivos. La plataforma esta llena de matones armados y peligrosos, por lo que hemos designado esto como un contrato de nivel amarillo.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement es un especialista en seguridad con licencia para operar en toda la UEE. Siempre estamos buscando nuevos operadores para unirse a nuestra familia. Si tu o alguien que conoces esta interesado, comunicate con uno de nuestros representantes de contratos.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Brazos Antium Granate\n- Torso Antium Granate\n- Piernas Antium Granate\n- Casco Antium Granate\n- Casco Antium Camuflaje Musgo\n- Brazos Antium Camuflaje Musgo\n- Torso Antium Camuflaje Musgo\n- Piernas Antium Camuflaje Musgo\n
