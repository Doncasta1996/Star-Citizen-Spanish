shubin_rockcracker_solo_desc_01=CONTRATO: Transferencia de Derechos de Mineria\nLOCALIZACION: Nyx\n\nDETALLES:\nProspectores de Shubin Interstellar han descubierto recientemente la ubicacion de una Estacion Trituradora QV Planetary Service abandonada cerca del cinturon Keeger. Estas estaciones eran utilizadas originalmente por la extinta empresa para extraer recursos valiosos del interior de asteroides, pero el conocimiento de sus ubicaciones exactas se ha perdido con los anos.\n\nAunque esta estacion en particular esta fuera de linea, nuestro equipo de exploracion cree que podria volver a ser funcional con las reparaciones necesarias. Adicionalmente, si se reactivara, ya hay un asteroide rico en recursos listo para ser fracturado por el laser minero de la estacion.\n\nDesafortunadamente, con todos los diversos desafios que conlleva operar en Nyx, Shubin no tiene actualmente el ancho de banda disponible para manejar las reparaciones mencionadas nosotros mismos. Sin embargo, esto ha creado una oportunidad para una operacion minera independiente interesada como la tuya.\n\n<EM4>CONDICIONES*:</EM4>\nEstamos poniendo a disposicion los <EM4>derechos de mineria exclusivos</EM4> de esta Estacion QV Breaker. Al comprarlos, proporcionaremos las coordenadas de la estacion unicamente a ti y a tu tripulacion. Tu equipo sera entonces libre de dirigirse alli con una <EM4>nave de mineria</EM4>, restaurar el <EM4>laser minero de la estacion</EM4> a un estado operativo, fracturar el asteroide y <EM4>cosechar los recursos</EM4> de su interior.\n\nTen en cuenta que, aunque garantizamos que estas coordenadas seran exclusivas para ti, no podemos asegurar que otras partes interesadas, como forajidos, no puedan descubrir la ubicacion de la estacion por su cuenta. Se recomienda precaucion.\n\n*Al aceptar este contrato, asumes todos y cada uno de los riesgos asociados con el trabajo aqui descrito y de ninguna manera Shubin Interstellar puede ser responsable por cualquier daño acumulado durante la duracion del contrato.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97 "Kismet"\n- Escopeta R97 "Righteous"\n- Brazos Monde Camuflaje Delta\n- Piernas Monde Camuflaje Delta\n- Torso Monde Camuflaje Delta\n- Casco Monde Camuflaje Delta\n- Casco Monde Daimyo\n- Piernas Monde Camuflaje Hemlock\n- Torso Monde Camuflaje Hemlock\n- Brazos Monde Camuflaje Hemlock\n- Cargador de Escopeta R97 (18 balas)\n
shubin_rockcracker_pvp_desc_01=CONTRATO: Transferencia de Derechos de Mineria\nLOCALIZACION: Nyx\n\nDETALLES:\nProspectores de Shubin Interstellar han descubierto recientemente la ubicacion de una Estacion Trituradora QV Planetary Service abandonada cerca del cinturon Keeger. Estas estaciones eran utilizadas originalmente por la extinta empresa para extraer recursos valiosos del interior de asteroides, pero el conocimiento de sus ubicaciones exactas se ha perdido con los anos.\n\nAunque esta estacion en particular esta fuera de linea, nuestro equipo de exploracion cree que podria volver a ser funcional con las reparaciones necesarias. Adicionalmente, si se reactivara, ya hay un asteroide rico en recursos listo para ser fracturado por el laser minero de la estacion.\n\nDesafortunadamente, con todos los diversos desafios que conlleva operar en Nyx, Shubin no tiene actualmente el ancho de banda disponible para manejar las reparaciones mencionadas nosotros mismos. Sin embargo, esto ha creado una oportunidad para una operacion minera independiente interesada como la tuya.\n\n<EM4>CONDICIONES*:</EM4>\nEstamos poniendo a disposicion los <EM4>derechos de mineria compartidos</EM4> de esta Estacion QV Breaker. Al comprarlos, proporcionaremos las coordenadas de la estacion a ti y a tu tripulacion. (Recuerda, cualquier otra parte interesada que compre los derechos de mineria tambien obtendra acceso a la estacion). Tu equipo sera entonces libre de dirigirse alli con una <EM4>nave de mineria</EM4>, restaurar el <EM4>laser minero de la estacion</EM4> a un estado operativo, fracturar el asteroide y <EM4>cosechar los recursos</EM4> de su interior.\n\nTen en cuenta que, dado que este es un contrato compartido, podemos ofrecer estos derechos de mineria a un precio reducido, pero los recursos en el asteroide estaran disponibles por orden de llegada con cualquier otro equipo minero en el sitio. Ademas, existe la posibilidad de que otras partes interesadas, como forajidos, puedan descubrir la ubicacion de la estacion por su cuenta. Se recomienda precaucion.\n\n*Al aceptar este contrato, asumes todos y cada uno de los riesgos asociados con el trabajo aqui descrito y de ninguna manera Shubin Interstellar puede ser responsable por cualquier daño acumulado durante la duracion del contrato.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Escopeta R97 "Kismet"\n- Escopeta R97 "Righteous"\n- Brazos Monde Camuflaje Delta\n- Piernas Monde Camuflaje Delta\n- Torso Monde Camuflaje Delta\n- Casco Monde Camuflaje Delta\n- Casco Monde Daimyo\n- Piernas Monde Camuflaje Hemlock\n- Torso Monde Camuflaje Hemlock\n- Brazos Monde Camuflaje Hemlock\n- Cargador de Escopeta R97 (18 balas)\n
Shubin_Industrial_HandMining_Intro_Local_Desc_001=AVISO: Orden de Compra\nLOCALIZACION: <EM4>~mission(System) </EM4>\n\nPRUEBA TECNICA PRELIMINAR:\nCompleta esta mision para obtener planos de armas Volt. Para esta prueba, estos planos tienen algunas ranuras que aceptan diferentes materiales para variar los ajustes de estadisticas.\n\n~mission(Hint_Location) Para una lista completa de donde encontrar estos minerales, consulta <EM4>Fundamentos de Mineria #2: Donde Minar</EM4> en el Diario de tu mobiGlas. Ya que estas alli, puedes leer tambien la primera parte, <EM4>Fundamentos de Mineria #1: Descripcion General Basica</EM4>, si quieres refrescar como obtener los materiales.\n\nDado que esta es una orden de compra y no un contrato de mineria, se espera que proporciones tu propio equipo, como un <EM4>~mission(Hint_Tool)</EM4>.\n\nUna vez que estes listo para vendernos los materiales requeridos, depositalos en el elevador de carga ubicado en <EM4>~mission(Destination|Address)</EM4>.\n\n<EM4>Planos potenciales</EM4>\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Monox, PYAM-FARSTAT-2-0, rr_p2_leo_clinic</EM4>\n- Pistola Arclight "Herrero"\n- Pistola Arclight "Sombra del desierto"\n- Traje de exploracion Pembroke\n- Casco Pembroke\n- Traje de exploracion Novikov\n- Casco Novikov\n- Bateria de pistola Arclight (30 balas)\n\n<EM4>[Variantes regionales] ubicaciones de ejemplo: Hurston, HUR L1, HUR L2</EM4>\n- Pistola Arclight "Medianoche"\n- Brazos Strata\n- Torso Strata\n- Piernas Strata\n- Casco Strata Estrella Fugaz\n- Bateria de pistola Arclight (30 balas)\n
Shubin_Industrial_HandMining_Stanton_E_Local_Desc_001=AVISO: Orden de Compra\nLOCALIZACION: <EM4>~mission(System) </EM4>\n\nPRUEBA TECNICA PRELIMINAR:\nCompleta esta mision para obtener planos de armas Volt. Para esta prueba, estos planos tienen algunas ranuras que aceptan diferentes materiales para variar los ajustes de estadisticas.\n\n~mission(Hint_Location) Se han reportado avistamientos de kopions en el area, asi que actua con precaucion.\n\nPara una lista completa de donde encontrar estos minerales, consulta <EM4>Fundamentos de Mineria #2: Donde Minar</EM4> en el Diario de tu mobiGlas. Ya que estas alli, puedes leer tambien la primera parte, <EM4>Fundamentos de Mineria #1: Descripcion General Basica</EM4>, si quieres refrescar como obtener los materiales.\n\nDado que esta es una orden de compra y no un contrato de mineria, se espera que proporciones tu propio equipo, como un <EM4>~mission(Hint_Tool)</EM4>.\n\nUna vez que estes listo para vendernos los materiales requeridos, depositalos en el elevador de carga ubicado en <EM4>~mission(Destination|Address)</EM4>.\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Arclight "Medianoche"\n- Brazos Strata\n- Torso Strata\n- Piernas Strata\n- Casco Strata Estrella Fugaz\n- Bateria de pistola Arclight (30 balas)\n
