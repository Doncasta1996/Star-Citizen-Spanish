Shubin_Industrial_ShipMining_Stanton_E_Local_Desc_001=AVISO: Orden de Compra\nLOCALIZACION: <EM4>~mission(System) </EM4>\n\nCONDICIONES*:\nDebido a cambios en nuestra cadena de suministro, Shubin Interstellar actualmente busca comprar una variedad de materiales refinados de mineros independientes que operan en el area. Si bien vender en un centro comercial puede darte un precio mas competitivo que cumplir nuestra orden, muchos mineros consideran que fortalecer sus lazos con Shubin es una sabia inversion a largo plazo para su carrera.\n\n~mission(Hint_Location) Para una lista completa de donde encontrar estos minerales, consulta <EM4>Fundamentos de Mineria #2: Donde Minar</EM4> en el Diario de tu mobiGlas. Mientras estas alli, no dudes en leer la primera parte <EM4>Fundamentos de Mineria #1: Descripcion General Basica</EM4> si quieres un repaso de como obtener los materiales.\n\nDado que esta es una orden de compra y no un contrato de mineria, se espera que proporciones tu propio equipo, como un <EM4>~mission(Hint_Tool)</EM4>.\n\nTen en cuenta que, en un esfuerzo por agilizar el uso futuro de estos materiales, <EM4>deben ser refinados antes de la entrega</EM4>. Esto puede hacerse en cualquier refineria, cuyas ubicaciones puedes encontrar en tu Mapa Estelar.\n\nUna vez que estes listo para vendernos los materiales refinados requeridos, depositalos en el elevador de carga ubicado en <EM4>~mission(Destination|Address)</EM4>.\n\n*Al aceptar este contrato, asumes todos y cada uno de los riesgos asociados con el trabajo aqui descrito y de ninguna manera Shubin Interstellar puede ser responsable por cualquier daño acumulado durante la duracion del contrato.\n\n\n\n<EM4>Planos potenciales</EM4>\n- Pistola Arclight "Nightstalker"\n- Brazos Aril\n- Torso Aril\n- Piernas Aril\n- Casco Aril\n- Pistola Arclight "Warhawk"\n- Bateria de Pistola Arclight (30 balas)\n
